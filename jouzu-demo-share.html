<!DOCTYPE html>
<html lang="ja" data-brand="snsclub">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a6e" id="metaThemeColor" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>じょーず – デモ共有版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
/* じょーず – モバイル投稿管理アプリ
 * ブランド切替: html[data-brand="snsclub"] 生徒向け（SnsClub 系・ネイビー＋ゴールド）
 *              html[data-brand="levela"]  運営・MG等（Levela 系・レッド～オレンジ）
 */
:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --brand: #0ea5e9;
  --brand-dark: #0284c7;
  --brand-ink: #ffffff;
  --header-shadow: rgba(14, 165, 233, 0.25);
  --ok: #10b981;
  --warn: #d97706;
  --danger: #dc2626;
  --radius: 14px;
  --nav-h: 64px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  font-family: "Noto Sans JP", system-ui, sans-serif;
}

/* ① 生徒が触れるサービス色（SnsClub：ディープネイビー × ゴールド） */
html[data-brand="snsclub"] {
  --bg: #f4f6fb;
  --brand: #c9a227;
  --brand-dark: #1a2f52;
  --brand-ink: #0f1f3a;
  --header-shadow: rgba(26, 47, 82, 0.35);
}

html[data-brand="snsclub"] .app-header {
  background: linear-gradient(145deg, #0f1f3a 0%, #1a3a6e 42%, #142a50 100%);
  box-shadow: 0 2px 16px var(--header-shadow);
  border-bottom: 3px solid #c9a227;
}

html[data-brand="snsclub"] .btn-primary {
  background: linear-gradient(180deg, #e3c657 0%, #c9a227 55%, #b89220 100%);
  color: var(--brand-ink);
  box-shadow: 0 2px 8px rgba(26, 47, 82, 0.2);
}

html[data-brand="snsclub"] .btn-secondary {
  background: #e2eaf8;
  color: var(--brand-dark);
}

html[data-brand="snsclub"] .type-post {
  background: #dde7f7;
}

html[data-brand="snsclub"] .stat-box {
  background: linear-gradient(180deg, #eef2fa 0%, #e2eaf8 100%);
}

/* ② 会社ロゴ色（Levela：レッド～オレンジのグラデ） */
html[data-brand="levela"] {
  --bg: #faf5f5;
  --brand: #e11d48;
  --brand-dark: #881337;
  --brand-ink: #ffffff;
  --header-shadow: rgba(185, 28, 28, 0.35);
}

html[data-brand="levela"] .app-header {
  background: linear-gradient(130deg, #881337 0%, #dc2626 38%, #ea580c 72%, #f59e0b 100%);
  box-shadow: 0 2px 16px var(--header-shadow);
}

html[data-brand="levela"] .btn-primary {
  background: linear-gradient(180deg, #f43f5e 0%, #e11d48 50%, #be123c 100%);
  color: #fff;
  box-shadow: 0 2px 10px rgba(190, 18, 60, 0.35);
}

html[data-brand="levela"] .btn-secondary {
  background: #ffe4e6;
  color: #9f1239;
}

html[data-brand="levela"] .type-post {
  background: #ffe4e6;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: calc(var(--nav-h) + var(--safe-b) + 8px);
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 20;
  /* data-brand 未定時のフォールバック（ログイン前は snsclub と同系） */
  background: linear-gradient(145deg, #0f1f3a 0%, #1a3a6e 100%);
  color: #fff;
  padding: 12px 16px calc(12px + env(safe-area-inset-top, 0));
  padding-top: calc(12px + env(safe-area-inset-top, 0));
  box-shadow: 0 2px 12px var(--header-shadow);
}

.quick-consult-btn {
  position: absolute;
  right: 14px;
  top: calc(10px + env(safe-area-inset-top, 0));
  width: 56px;
  height: 42px;
  border-radius: 12px;
  border: none;
  background: #ffffff;
  color: var(--brand-dark);
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 2px 10px rgba(15, 23, 42, 0.2);
}

.app-header h1 {
  margin: 0;
  font-size: 1.05rem;
  font-weight: 700;
}

.app-header .sub {
  margin: 4px 0 0;
  font-size: 0.75rem;
  opacity: 0.9;
}

.screen {
  display: none;
  padding: 16px;
  max-width: 480px;
  margin: 0 auto;
  animation: fadeIn 0.2s ease;
}

.screen.active {
  display: block;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
  border: 1px solid #e2e8f0;
}

.card-title {
  font-size: 0.88rem;
  font-weight: 800;
  color: var(--text);
  letter-spacing: 0.02em;
  line-height: 1.35;
  margin: 0 0 10px;
}

html[data-brand="snsclub"] .card-title {
  color: #0f1f3a;
}

html[data-brand="levela"] .card-title {
  color: #1c1917;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px 18px;
  font-size: 1rem;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.08s ease, opacity 0.15s;
}

.btn:active {
  transform: scale(0.98);
}

.btn-primary {
  background: var(--brand);
  color: #fff;
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-secondary {
  background: #e0f2fe;
  color: var(--brand-dark);
}

.btn-ghost {
  background: transparent;
  color: var(--muted);
  padding: 10px;
}

.btn-small {
  padding: 10px 14px;
  font-size: 0.9rem;
  width: auto;
}

/* ホーム：メインCTAをスケジュールを開くと同じ primary・全幅に */
.home-student-cta {
  width: 100%;
  box-sizing: border-box;
  margin-top: 10px;
}

.input {
  width: 100%;
  padding: 14px 14px;
  font-size: 1rem;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  margin-bottom: 12px;
  font-family: inherit;
}

.input:focus {
  outline: none;
  border-color: var(--brand);
}

textarea.input {
  resize: vertical;
  min-height: 64px;
  line-height: 1.5;
}

.label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 6px;
}

.task-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid #f1f5f9;
}

.task-row:last-child {
  border-bottom: none;
}

.task-type-badge {
  flex-shrink: 0;
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
}

.type-post {
  background: #dbeafe;
}
.type-session {
  background: #d1fae5;
}
.type-lecture {
  background: #fef3c7;
}
.type-other {
  background: #e2e8f0;
}

.progress-track {
  height: 8px;
  background: #e2e8f0;
  border-radius: 4px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-fill {
  height: 100%;
  background: var(--brand);
  border-radius: 4px;
  transition: width 0.3s ease;
}

.progress-fill.done {
  background: var(--ok);
}

.due-soon {
  color: var(--warn);
  font-weight: 600;
  font-size: 0.8rem;
}
.due-over {
  color: var(--danger);
  font-weight: 600;
  font-size: 0.8rem;
}

.bottom-nav {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 30;
  background: var(--surface);
  border-top: 1px solid #e2e8f0;
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: calc(var(--nav-h) + var(--safe-b));
  padding-bottom: var(--safe-b);
  box-shadow: 0 -4px 20px rgba(15, 23, 42, 0.06);
}

.bottom-nav button {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 4px;
  border: none;
  background: none;
  font-size: 0.65rem;
  color: var(--muted);
  cursor: pointer;
  font-family: inherit;
}

.bottom-nav button .icon {
  font-size: 1.35rem;
  line-height: 1;
}

.bottom-nav button.active {
  color: var(--brand);
  font-weight: 700;
}

.role-chip {
  display: inline-block;
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.25);
  margin-top: 6px;
}

.demo-grid {
  display: grid;
  gap: 8px;
  margin-top: 16px;
}

.quick-login {
  text-align: left;
  padding: 12px 14px;
  border-radius: 12px;
  border: 2px solid #e2e8f0;
  background: #fff;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.85rem;
}

.quick-login strong {
  display: block;
  margin-bottom: 2px;
  color: var(--text);
}

.quick-login span {
  color: var(--muted);
  font-size: 0.75rem;
}

.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--muted);
  font-size: 0.9rem;
}

.student-picker {
  width: 100%;
  padding: 12px;
  font-size: 1rem;
  border-radius: 12px;
  border: 2px solid #e2e8f0;
  margin-bottom: 16px;
  font-family: inherit;
  background: #fff;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 8px;
}

.stat-box {
  background: #f8fafc;
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
}

.stat-box .num {
  font-size: 1.25rem;
  font-weight: 800;
  color: var(--brand);
}

.stat-box .lbl {
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 4px;
}

.stat-box--starter-home {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 72px;
}

.stat-box--starter-home .lbl {
  margin-top: 0;
  margin-bottom: 2px;
}

.stat-box--starter-home-bar {
  margin: 4px 0;
}

.stat-box--starter-home-pct {
  font-size: 1.05rem !important;
  margin-top: 2px;
}

/* --- Login: password reset --- */
.login-forgot-wrap {
  margin: 12px 0 0;
  text-align: center;
}
.btn-text-link {
  background: none;
  border: none;
  padding: 0;
  margin: 0;
  font-size: 0.8rem;
  color: var(--brand-dark, #0284c7);
  text-decoration: underline;
  cursor: pointer;
  font-family: inherit;
}
html[data-brand="snsclub"] .btn-text-link {
  color: #1a3a6e;
}
.login-pwreset-panel {
  margin-top: 14px;
  padding: 14px 12px;
  border-radius: var(--radius, 14px);
  border: 1px solid #e2e8f0;
  background: #f8fafc;
  text-align: left;
}
.login-pwreset-title {
  margin: 0 0 8px !important;
  font-size: 0.95rem !important;
}
.login-pwreset-hint {
  margin: 0 0 12px;
  font-size: 0.72rem;
  color: var(--muted);
  line-height: 1.5;
}
.login-pwreset-step2 {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px dashed #cbd5e1;
}
.login-pwreset-demo-banner {
  margin: 0 0 12px;
  padding: 10px 12px;
  border-radius: 10px;
  background: #fef3c7;
  border: 1px solid #fcd34d;
  font-size: 0.75rem;
  line-height: 1.45;
  color: #78350f;
}
.pw-reset-code-disp {
  font-size: 1.05rem;
  letter-spacing: 0.12em;
}
.login-pwreset-back {
  display: block;
  margin: 14px auto 0;
  text-align: center;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* --- Admin: starter program day editor --- */
.admin-starter-card {
  margin-bottom: 14px;
}
.admin-starter-hint {
  margin: 0 0 12px;
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.5;
}
.admin-starter-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 420px;
  overflow-y: auto;
  padding: 2px 0;
}
.admin-starter-row {
  display: grid;
  grid-template-columns: 52px 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 8px 10px;
  background: #f8fafc;
  border-radius: 10px;
  border: 1px solid #e8edf3;
}
.admin-starter-idx {
  font-size: 0.65rem;
  font-weight: 800;
  color: var(--muted);
  letter-spacing: 0.02em;
}
.admin-starter-title {
  font-size: 0.74rem;
  line-height: 1.35;
  color: var(--text);
  min-width: 0;
}
.admin-starter-days-label {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}
.admin-starter-day-input {
  width: 52px !important;
  min-width: 52px;
  padding: 6px 8px !important;
  text-align: center;
}
.admin-starter-days-unit {
  font-size: 0.72rem;
  color: var(--muted);
  font-weight: 600;
}

.admin-sess-tasklib-card {
  margin-bottom: 14px;
}
.admin-sess-tasklib-row {
  margin-bottom: 8px;
}
.admin-sess-tasklib-input {
  width: 100%;
}

/* === チームタブ：担当生徒オーバービュー（MG/コーチ/リーダー） === */
.mg-team-card .mg-team-hint {
  margin: 0 0 12px;
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.45;
}
.mg-team-chips-scroll {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  margin: 0 -4px 16px;
  padding: 0 4px 6px;
}
.mg-team-chips {
  display: flex;
  gap: 10px;
  flex-wrap: nowrap;
}
.mg-team-chip {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  min-width: 72px;
  max-width: 104px;
  padding: 10px 8px 8px;
  border-radius: 999px;
  border: 2px solid #e2e8f0;
  background: var(--surface);
  cursor: pointer;
  font: inherit;
  color: var(--text);
  transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
}
.mg-team-chip--active {
  border-color: var(--brand);
  background: linear-gradient(180deg, rgba(14, 165, 233, 0.08) 0%, var(--surface) 100%);
  box-shadow: 0 2px 10px var(--header-shadow);
}
html[data-brand="levela"] .mg-team-chip--active {
  background: linear-gradient(180deg, rgba(225, 29, 72, 0.08) 0%, var(--surface) 100%);
}
.mg-team-chip-avatar {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: linear-gradient(145deg, #e0f2fe 0%, #bae6fd 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 1rem;
  color: var(--brand-dark);
}
html[data-brand="levela"] .mg-team-chip-avatar {
  background: linear-gradient(145deg, #ffe4e6 0%, #fecdd3 100%);
  color: #9f1239;
}
.mg-team-chip-name {
  font-size: 0.68rem;
  font-weight: 600;
  line-height: 1.25;
  text-align: center;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  word-break: break-all;
}
.mg-team-detail {
  border-top: 1px solid #e2e8f0;
  padding-top: 14px;
}
.mg-team-detail-title {
  font-weight: 700;
  font-size: 1.05rem;
  margin-bottom: 8px;
}
.mg-team-detail-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.mg-pill {
  display: inline-flex;
  align-items: center;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 999px;
  max-width: 100%;
}
.mg-pill-class {
  background: #e0f2fe;
  color: #0369a1;
}
html[data-brand="levela"] .mg-pill-class {
  background: #fce7f3;
  color: #9d174d;
}
.mg-pill-period {
  background: #f1f5f9;
  color: var(--muted);
}
.mg-team-metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 14px 0 12px;
}
.mg-metric {
  background: var(--bg);
  border-radius: 12px;
  padding: 10px 12px;
  border: 1px solid #e2e8f0;
}
.mg-metric-lbl {
  display: block;
  font-size: 0.7rem;
  color: var(--muted);
  font-weight: 600;
  margin-bottom: 4px;
}
.mg-metric-val {
  font-size: 1.25rem;
  font-weight: 700;
}
.mg-metric-unit {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--muted);
  margin-left: 2px;
}
.mg-team-progress-block {
  margin-bottom: 14px;
}
.mg-team-progress-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.8rem;
  font-weight: 700;
  margin-bottom: 6px;
}
.mg-team-progress-pct {
  color: var(--brand);
}
.mg-team-bar {
  height: 10px;
}
.mg-team-progress-sub {
  margin: 6px 0 0;
  font-size: 0.72rem;
  color: var(--muted);
}
.mg-team-today-lbl {
  font-size: 0.8rem;
  font-weight: 700;
  margin-bottom: 8px;
}
.mg-team-today-empty {
  margin: 0;
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.4;
}
.mg-team-today-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: flex-start;
}
.mg-mini-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  max-width: 100%;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 0.72rem;
  font-weight: 600;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  color: var(--text);
}
.mg-mini-chip--done {
  background: #ecfdf5;
  border-color: #a7f3d0;
  color: #065f46;
}
.mg-mini-chip-ico {
  flex-shrink: 0;
}
.mg-mini-chip-txt {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 200px;
}
.mg-mini-chip-check {
  flex-shrink: 0;
  color: var(--ok);
  font-weight: 700;
}
.mg-team-alert {
  margin: 12px 0 0;
  padding: 10px 12px;
  border-radius: 10px;
  background: #fef2f2;
  color: #991b1b;
  font-size: 0.78rem;
  font-weight: 600;
}
.mg-team-footnote {
  font-size: 0.72rem;
  color: var(--muted);
  text-align: center;
  margin: 12px 0 0;
}

.hidden {
  display: none !important;
}

.milestone-hint {
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.5;
  margin: 0 0 14px;
}

.milestone-computed {
  margin: 12px 0 0;
  padding: 12px;
  border-radius: 10px;
  background: var(--bg);
  border: 1px solid #e2e8f0;
  font-size: 0.9rem;
}

.milestone-computed strong {
  font-size: 1.05rem;
}

.mline-mini {
  display: block;
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 4px;
}

/* === マイページ === */
.avatar-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}

.avatar-circle {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--bg);
  border: 3px solid #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}

.avatar-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.avatar-circle .avatar-placeholder {
  color: var(--muted);
  font-size: 2rem;
  line-height: 1;
}

.avatar-change {
  font-size: 0.75rem;
  color: var(--brand);
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
}

.sns-links {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 8px;
}

.sns-link-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 10px;
  text-decoration: none;
  color: var(--text);
  font-size: 0.9rem;
  transition: background 0.15s;
}

.sns-link-row:active {
  background: #e2e8f0;
}

.sns-link-row .sns-icon {
  flex-shrink: 0;
  width: 28px;
  text-align: center;
  font-size: 1.1rem;
}

.sns-link-row .sns-handle {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sns-link-row .sns-arrow {
  flex-shrink: 0;
  color: var(--muted);
  font-size: 0.8rem;
}

.stat-banner {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 8px;
}

.stat-banner .stat-box {
  padding: 14px 10px;
}

.contact-mg-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 2px solid var(--brand);
  background: var(--surface);
  color: var(--brand);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}

.contact-mg-btn:active {
  background: var(--bg);
}

/* === チャット === */
.chat-back {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border: none;
  background: none;
  color: var(--brand);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  padding: 0 0 12px;
}

.chat-messages {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 55vh;
  overflow-y: auto;
  padding: 4px 0 12px;
  -webkit-overflow-scrolling: touch;
}

.chat-bubble {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 0.9rem;
  line-height: 1.5;
  word-break: break-word;
}

.chat-bubble.mine {
  align-self: flex-end;
  background: var(--brand);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.chat-bubble.theirs {
  align-self: flex-start;
  background: #e2e8f0;
  color: var(--text);
  border-bottom-left-radius: 4px;
}

.chat-bubble .chat-time {
  display: block;
  font-size: 0.65rem;
  opacity: 0.7;
  margin-top: 4px;
}

.chat-input-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.chat-input-row input {
  flex: 1;
  padding: 12px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  font-size: 1rem;
  font-family: inherit;
}

.chat-input-row input:focus {
  outline: none;
  border-color: var(--brand);
}

.chat-send-btn {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  border-radius: 12px;
  border: none;
  background: var(--brand);
  color: #fff;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chat-send-btn:active {
  opacity: 0.8;
}

/* === ロードマップ === */
.roadmap {
  position: relative;
  padding: 24px 0 16px;
}

.roadmap-title {
  text-align: center;
  font-size: 1.05rem;
  font-weight: 700;
  margin: 0 0 4px;
}

.roadmap-sub {
  text-align: center;
  font-size: 0.8rem;
  color: var(--muted);
  margin: 0 0 20px;
}

.roadmap-path {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 0;
  padding: 0 8px;
}

.rmap-segment {
  position: relative;
  display: flex;
  align-items: flex-start;
  min-height: 124px;
}

.rmap-segment:last-child {
  min-height: auto;
}

.rmap-segment.align-left {
  flex-direction: row;
}

.rmap-segment.align-right {
  flex-direction: row;
}

.rmap-node-col {
  position: relative;
  flex-shrink: 0;
  width: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 2;
}

.rmap-road {
  position: absolute;
  top: 56px;
  bottom: -68px;
  left: 50%;
  width: 3px;
  margin-left: -1.5px;
  background: #d1d5db;
  border-radius: 3px;
  z-index: 0;
}

.rmap-road.active {
  background: var(--brand);
}

.rmap-circle {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  border: 4px solid #cbd5e1;
  background: #fff;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  z-index: 2;
  position: relative;
}

.rmap-circle:active {
  transform: scale(0.95);
}

.rmap-circle.status-done {
  border-color: var(--brand-dark);
  background: var(--brand-dark);
  color: #fff;
  box-shadow: 0 2px 10px rgba(15, 23, 42, 0.2);
}

.rmap-circle.status-current {
  border-color: var(--brand);
  background: #fff;
  color: var(--brand);
  box-shadow: 0 0 0 7px rgba(14, 165, 233, 0.22), 0 2px 14px rgba(14, 165, 233, 0.2);
  animation: pulse-node 2s ease-in-out infinite;
}

html[data-brand="snsclub"] .rmap-circle.status-current {
  border-color: #c9a227;
  background: #fff;
  color: #c9a227;
  box-shadow: 0 0 0 7px rgba(201, 162, 39, 0.26), 0 2px 14px rgba(201, 162, 39, 0.24);
}

.rmap-circle.status-locked {
  border-color: #e2e8f0;
  background: #f1f5f9;
  color: #94a3b8;
  cursor: default;
}

.rmap-segment.inactive .rmap-circle {
  border-color: #d1d5db;
  background: #eef2f7;
  color: #94a3b8;
  box-shadow: none;
  animation: none;
}

.rmap-segment.inactive .rmap-label,
.rmap-segment.inactive .rmap-name,
.rmap-segment.inactive .rmap-date,
.rmap-segment.inactive .rmap-progress-mini {
  opacity: 0.58;
}

@keyframes pulse-node {
  0%, 100% { box-shadow: 0 2px 14px rgba(14, 165, 233, 0.4); }
  50% { box-shadow: 0 2px 24px rgba(14, 165, 233, 0.6); }
}

html[data-brand="snsclub"] @keyframes pulse-node {
  0%, 100% { box-shadow: 0 2px 14px rgba(201, 162, 39, 0.5); }
  50% { box-shadow: 0 2px 24px rgba(201, 162, 39, 0.7); }
}

.rmap-info {
  flex: 1;
  padding: 6px 12px;
  min-width: 0;
}

.rmap-label {
  font-size: 0.7rem;
  color: var(--muted);
  margin: 0 0 2px;
}

.rmap-name {
  font-size: 0.95rem;
  font-weight: 700;
  margin: 0;
  line-height: 1.3;
}

.rmap-date {
  font-size: 0.75rem;
  color: var(--muted);
  margin: 4px 0 0;
}

.rmap-date.celebrate {
  color: var(--brand-dark);
  font-weight: 600;
}

.rmap-detail {
  margin-top: 10px;
  background: var(--surface);
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 14px;
  animation: fadeIn 0.2s ease;
}

.rmap-detail-title {
  font-size: 0.8rem;
  font-weight: 700;
  margin: 0 0 10px;
  color: var(--brand-dark);
}

.rmap-detail .task-row {
  padding: 10px 0;
}

.rmap-progress-mini {
  height: 4px;
  background: #e2e8f0;
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}

.rmap-progress-mini .fill {
  height: 100%;
  background: var(--brand);
  border-radius: 2px;
  transition: width 0.4s ease;
}

.rmap-progress-mini .fill.done {
  background: var(--brand-dark);
}

.rmap-current-tag {
  position: absolute;
  right: -16px;
  top: -12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.62rem;
  font-weight: 700;
  color: #fff;
  background: var(--brand);
  border-radius: 999px;
  padding: 2px 7px;
  line-height: 1.1;
}

html[data-brand="snsclub"] .rmap-current-tag {
  background: #c9a227;
  color: #0f1f3a;
}

/* === 目標カード (My Vision) === */
.vision-card {
  border: 2px solid #c9a227;
  border-radius: 16px;
  padding: 0;
  margin-bottom: 12px;
  overflow: hidden;
  background: var(--surface);
}

html[data-brand="levela"] .vision-card {
  border-color: #e11d48;
}

.vision-header {
  background: linear-gradient(135deg, #0f1f3a 0%, #1a3a6e 100%);
  color: #fff;
  padding: 14px 16px 10px;
  text-align: center;
  position: relative;
}

html[data-brand="levela"] .vision-header {
  background: linear-gradient(135deg, #881337 0%, #dc2626 100%);
}

.vision-header .vh-label {
  font-size: 0.65rem;
  opacity: 0.8;
  letter-spacing: 0.06em;
  margin: 0 0 2px;
  text-transform: uppercase;
}

.vision-header .vh-name {
  font-size: 1rem;
  font-weight: 700;
  margin: 0;
}

.vision-edit-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  border: 1px solid rgba(255, 255, 255, 0.45);
  background: rgba(255, 255, 255, 0.18);
  color: #fff;
  border-radius: 999px;
  font-size: 0.72rem;
  padding: 6px 10px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 700;
}

.profile-main-card {
  position: relative;
}

.card-edit-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  border: 1px solid #cbd5e1;
  background: #fff;
  color: var(--muted);
  border-radius: 999px;
  font-size: 0.72rem;
  padding: 6px 10px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 700;
}

.vision-body {
  padding: 14px 16px 16px;
}

.vision-item {
  padding: 12px 0;
  border-bottom: 1px solid #f1f5f9;
}

.vision-item:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.vision-item .vi-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
  margin: 0 0 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.vision-item .vi-text {
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.5;
  margin: 0;
  white-space: pre-wrap;
  word-break: break-word;
}

.vision-item .vi-text.empty {
  color: var(--muted);
  font-weight: 400;
  font-style: italic;
}

.vision-edit-hint {
  text-align: center;
  font-size: 0.7rem;
  color: var(--brand);
  font-weight: 600;
  padding: 0 16px 12px;
  cursor: pointer;
}

.vision-pace {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  background: var(--bg);
  border: 1px solid #e2e8f0;
}

.vp-head {
  margin: 0;
  font-size: 0.82rem;
  line-height: 1.5;
}

.vp-sub {
  margin: 4px 0 8px;
  font-size: 0.72rem;
  color: var(--muted);
}

.vp-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.vp-chip {
  font-size: 0.7rem;
  padding: 4px 8px;
  border-radius: 999px;
  background: #e2e8f0;
  color: var(--text);
  font-weight: 600;
}

/* === 次の投稿予定 === */
.next-post-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: 14px;
  background: var(--surface);
  border: 1px solid #e2e8f0;
  margin-bottom: 12px;
}

.next-post-icon {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, #dbeafe, #bfdbfe);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
}

html[data-brand="snsclub"] .next-post-icon {
  background: linear-gradient(135deg, #e2eaf8, #c7d4ed);
}

.next-post-info {
  flex: 1;
  min-width: 0;
}

.next-post-info .np-label {
  font-size: 0.7rem;
  color: var(--muted);
  margin: 0 0 2px;
}

.next-post-info .np-date {
  font-size: 1.05rem;
  font-weight: 700;
  margin: 0;
}

.next-post-info .np-days {
  font-size: 0.8rem;
  margin: 2px 0 0;
}

/* === 相談（ボイスメモ + 要約） === */
.consult-record-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 18px;
  border-radius: 16px;
  border: 3px dashed #e2e8f0;
  background: var(--surface);
  color: var(--text);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.consult-record-btn:active {
  transform: scale(0.98);
}

.consult-record-btn.recording {
  border-color: var(--danger);
  background: #fef2f2;
  color: var(--danger);
  animation: pulse-rec 1.5s ease-in-out infinite;
}

@keyframes pulse-rec {
  0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.2); }
  50% { box-shadow: 0 0 0 12px rgba(220, 38, 38, 0); }
}

.consult-transcript {
  background: var(--bg);
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 14px;
  font-size: 0.9rem;
  line-height: 1.6;
  margin-top: 12px;
  min-height: 60px;
  white-space: pre-wrap;
  word-break: break-word;
}

.consult-summary-card {
  background: linear-gradient(135deg, #ecfdf5, #d1fae5);
  border: 1px solid #6ee7b7;
  border-radius: 12px;
  padding: 14px;
  margin-top: 12px;
}

.consult-summary-card .cs-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: #065f46;
  margin: 0 0 6px;
}

.consult-summary-card .cs-text {
  font-size: 0.9rem;
  font-weight: 600;
  color: #064e3b;
  margin: 0 0 8px;
  line-height: 1.5;
}

.consult-categories {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.consult-cat-chip {
  font-size: 0.7rem;
  padding: 4px 10px;
  border-radius: 999px;
  background: #d1fae5;
  color: #065f46;
  font-weight: 600;
}

.consult-or {
  text-align: center;
  font-size: 0.8rem;
  color: var(--muted);
  margin: 12px 0;
}

/* === schedule === */
.schedule-key-dates {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.schedule-key-box {
  background: var(--bg);
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 10px;
}

.schedule-key-box span {
  display: block;
  font-size: 0.72rem;
  color: var(--muted);
}

.schedule-key-box strong {
  display: block;
  margin-top: 4px;
  font-size: 0.92rem;
}

.schedule-scroll {
  max-height: 56vh;
  overflow: auto;
  padding-right: 2px;
}

.schedule-day-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 0;
  border-bottom: 1px solid #f1f5f9;
}

.schedule-day-row.today {
  background: #fffbeb;
}

.schedule-day-date {
  min-width: 130px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  font-size: 0.8rem;
}

.schedule-day-date .dnum {
  font-size: 0.68rem;
  color: var(--muted);
}

.schedule-day-items {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: flex-end;
}

.schedule-cat-chip {
  font-size: 0.7rem;
  padding: 4px 8px;
  border-radius: 999px;
  background: #e2e8f0;
  color: var(--text);
  font-weight: 600;
}

.schedule-day-empty {
  font-size: 0.72rem;
  color: var(--muted);
}

/* --- Month grid（Googleカレンダー風・範囲選択） --- */
.cal-schedule-stack {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 6px;
}
.cal-task-plus-btn {
  width: 100%;
  min-height: 54px;
  border-radius: 16px;
  border: 2px solid var(--brand);
  background: #fff;
  color: var(--brand);
  font-family: inherit;
  cursor: pointer;
  padding: 14px 18px;
  box-shadow: 0 4px 14px rgba(15, 23, 42, 0.08);
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
}
.cal-task-plus-btn:active {
  transform: scale(0.99);
}
.cal-task-plus-inner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.cal-task-plus-text {
  font-size: 1.08rem;
  font-weight: 800;
  letter-spacing: 0.06em;
}
.cal-task-plus-icon {
  font-size: 1.45rem;
  font-weight: 800;
  line-height: 1;
}
.cal-task-plus-btn--open {
  background: var(--brand);
  color: #fff;
  border-color: var(--brand);
  box-shadow: 0 4px 16px rgba(37, 99, 235, 0.35);
}
html[data-brand="snsclub"] .cal-task-plus-btn {
  border-color: #c9a227;
  color: #1a3a6e;
  background: linear-gradient(180deg, #fffef8 0%, #f5efd6 100%);
  box-shadow: 0 4px 14px rgba(26, 47, 82, 0.12);
}
html[data-brand="snsclub"] .cal-task-plus-btn--open {
  background: linear-gradient(180deg, #e3c657 0%, #c9a227 55%, #b89220 100%);
  color: #0f1f3a;
  border-color: #a67c1a;
  box-shadow: 0 4px 18px rgba(26, 47, 82, 0.28);
}
html[data-brand="levela"] .cal-task-plus-btn--open {
  box-shadow: 0 4px 16px rgba(225, 29, 72, 0.35);
}

.cal-month-wrap {
  padding: 8px 8px 6px;
  margin-bottom: 6px;
}
.cal-month-head {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 4px;
}
.cal-period-tabs {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  margin-bottom: 4px;
}
.cal-period-tab {
  padding: 5px 4px;
  border-radius: 8px;
  border: 1.5px solid #e2e8f0;
  background: #f8fafc;
  font-size: 0.65rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  color: var(--text);
  line-height: 1.2;
  -webkit-tap-highlight-color: transparent;
}
.cal-period-tab--active {
  background: #fff;
  border-color: var(--brand);
  color: var(--brand);
  box-shadow: 0 0 0 1px rgba(37, 99, 235, 0.12);
}
html[data-brand="snsclub"] .cal-period-tab--active {
  border-color: #c9a227;
  color: #1a3a6e;
  box-shadow: 0 0 0 1px rgba(201, 162, 39, 0.25);
}
.cal-period-tab:active {
  background: #f1f5f9;
}
.cal-month-nav-btn {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: none;
  background: #f1f5f9;
  font-size: 1.15rem;
  line-height: 1;
  cursor: pointer;
  font-family: inherit;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
}
.cal-month-nav-btn:active {
  background: #e2e8f0;
}
.cal-month-title {
  flex: 1;
  font-size: 0.92rem;
  font-weight: 700;
  text-align: center;
  min-width: 0;
}
.cal-month-today-btn {
  padding: 4px 8px;
  border-radius: 8px;
  border: 1px solid var(--brand);
  background: #fff;
  color: var(--brand);
  font-size: 0.65rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;

.home-memo-modal-panel {
  position: relative;
  width: 100%;
  max-width: 420px;
  max-height: min(70vh, 420px);
  overflow-y: auto;
  background: var(--surface);
  border-radius: 14px;
  padding: 14px 14px 16px;
  box-shadow: 0 -12px 40px rgba(0, 0, 0, 0.18);
}
.home-memo-modal-title {
  margin: 0 0 4px;
  font-size: 0.95rem;
  font-weight: 800;
}
.home-memo-modal-meta {
  margin: 0 0 10px;
  font-size: 0.72rem;
  color: var(--muted);
  font-weight: 600;
}
.home-memo-modal-panel .input {
  width: 100%;
  box-sizing: border-box;
  min-height: 100px;
  max-height: 200px;
  resize: vertical;
}
.home-memo-modal-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  justify-content: flex-end;
}
.home-memo-modal-actions .btn {
  flex: 1;
}

.sched-session-card {
  margin-bottom: 10px;
}
.sched-session-hint,
.sched-session-empty {
  font-size: 0.75rem;
  color: var(--muted);
  line-height: 1.45;
  margin: 0 0 10px;
}
.sched-session-auto-hint {
  font-size: 0.72rem;
  color: var(--text);
  line-height: 1.5;
  margin: 0 0 12px;
  padding: 10px 10px;
  border-radius: 10px;
  background: #f0f9ff;
  border: 1px solid #bae6fd;
}
.sched-session-auto-hint strong {
  font-weight: 800;
}
html[data-brand="snsclub"] .sched-session-auto-hint {
  background: #fffdf7;
  border-color: rgba(201, 162, 39, 0.35);
}

.schedule-mini-list {
  margin: 0 0 12px;
}

.schedule-mini-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid #f1f5f9;
  font-size: 0.82rem;
}

.home-split-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.home-split-col .next-post-card,
.home-split-col .home-side-card {
  margin-bottom: 0;
}

.home-side-card {
  padding: 12px;
}

.due-side-row {
  padding: 8px 0;
  border-bottom: 1px solid #f1f5f9;
}

.due-side-row:last-child {
  border-bottom: none;
}

.due-side-title {
  font-size: 0.82rem;
  font-weight: 700;
  line-height: 1.4;
}

.due-side-date {
  font-size: 0.72rem;
  margin-top: 3px;
}

/* swipe tasks */
.swipe-item {
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid #f1f5f9;
}

.swipe-item:last-child {
  border-bottom: none;
}

.swipe-actions {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 132px;
  display: flex;
  z-index: 1;
}

.swipe-btn {
  flex: 1;
  border: none;
  color: #fff;
  font-size: 0.74rem;
  font-weight: 700;
  font-family: inherit;
}

.swipe-btn.done {
  background: #0f766e;
}

.swipe-btn.postpone {
  background: #b45309;
}

.swipe-main {
  position: relative;
  z-index: 2;
  background: #fff;
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 12px 0;
  transition: transform 0.2s ease;
}

.swipe-item.open .swipe-main {
  transform: translateX(-132px);
}

.swipe-left-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.swipe-main-body {
  flex: 1;
  min-width: 0;
}

.swipe-title {
  font-size: 0.92rem;
  font-weight: 700;
}

.swipe-due {
  margin-top: 3px;
  font-size: 0.76rem;
}

.swipe-student {
  font-size: 0.7rem;
  color: var(--muted);
}

/* memo */
.memo-row {
  padding: 10px 0;
  border-bottom: 1px solid #f1f5f9;
}

.memo-row:last-child {
  border-bottom: none;
}

.memo-date {
  font-size: 0.68rem;
  color: var(--muted);
  margin-bottom: 2px;
}

.memo-text {
  font-size: 0.86rem;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}

.memo-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
}

.memo-cat-tag {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--brand);
  color: #fff;
  font-weight: 600;
}

html[data-brand="snsclub"] .memo-cat-tag {
  background: #1a2f52;
  color: #fff;
}

.memo-view-tabs {
  display: flex;
  gap: 0;
  margin: 0 0 4px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.memo-view-tab {
  flex: 1;
  padding: 8px 0;
  text-align: center;
  border: none;
  background: var(--card);
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
}
.memo-view-tab.active {
  background: var(--brand);
  color: #fff;
}

.memo-group-card {
  padding: 0 !important;
  overflow: hidden;
}
.memo-group-head {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 12px 16px;
  border: none;
  background: none;
  cursor: pointer;
  text-align: left;
  gap: 8px;
}
.memo-group-head:active {
  background: rgba(0,0,0,0.03);
}
.memo-group-title {
  font-size: 0.9rem;
  font-weight: 700;
  flex: 1;
}
.memo-group-count {
  font-size: 0.72rem;
  color: var(--muted);
  font-weight: 600;
}
.memo-group-arrow {
  font-size: 0.65rem;
  color: var(--muted);
}
.memo-group-body {
  padding: 0 16px 12px;
  max-height: 320px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.memo-entry {
  padding: 8px 0;
  border-top: 1px solid #f1f5f9;
}
.memo-more {
  margin: 8px 0 0;
  text-align: center;
  font-size: 0.72rem;
  color: var(--muted);
}

/* === 投稿ガントチャート === */
.gantt-card {
  padding: 16px;
  border: 1px solid #f0f0f0;
  box-shadow: none;
}

.gantt-header {
  margin-bottom: 10px;
}

.gantt-title-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.gantt-post-num {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
}

.gantt-title {
  font-size: 1.05rem;
  font-weight: 700;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.gantt-title-edit-btn {
  flex-shrink: 0;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  background: #fff;
  font-size: 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-family: inherit;
}

.gantt-title-edit-btn:active {
  background: var(--bg);
}

.gantt-title-edit {
  display: flex;
  align-items: center;
  gap: 6px;
}

.gantt-title-input {
  flex: 1;
  min-width: 0;
  padding: 6px 10px;
  font-size: 0.95rem;
  font-weight: 700;
  border: 2px solid var(--brand);
  border-radius: 8px;
  font-family: inherit;
  outline: none;
}

.gantt-title-save-btn {
  flex-shrink: 0;
  padding: 6px 10px;
  border-radius: 8px;
  border: none;
  background: var(--brand);
  color: #fff;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}

.gantt-title-cancel-btn {
  flex-shrink: 0;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  background: #fff;
  font-size: 0.9rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-family: inherit;
}

.gantt-meta {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 2px;
}

.gantt-progress-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}

.gantt-progress-bar {
  flex: 1;
  height: 8px;
  background: #e2e8f0;
  border-radius: 4px;
  overflow: hidden;
}

.gantt-progress-fill {
  height: 100%;
  background: var(--brand);
  border-radius: 4px;
  transition: width 0.4s ease;
}

.gantt-progress-fill.complete {
  background: var(--ok);
}

.gantt-pct {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--brand);
  min-width: 36px;
  text-align: right;
}

.gantt-phase-block {
  margin-top: 8px;
  border: 1px solid #f0f0f0;
  border-radius: 14px;
  padding: 10px 12px 6px;
  background: #fafcfe;
}

.gantt-phase-block.phase-complete {
  border-color: var(--ok);
  background: #f0fdf4;
}

.gantt-phase-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 8px;
  border-bottom: 1px solid #e2e8f0;
  margin-bottom: 4px;
}

.gantt-phase-head-left {
  flex: 1;
  min-width: 0;
}

.gantt-phase-label {
  font-size: 0.74rem;
  font-weight: 700;
  color: var(--text);
  margin: 0;
  letter-spacing: 0.02em;
}

.gantt-phase-deadline {
  font-size: 0.68rem;
  color: var(--muted);
  margin-top: 2px;
}

.gantt-phase-complete-btn {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--brand);
  background: #fff;
  color: var(--brand);
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.gantt-phase-complete-btn:active {
  background: var(--brand);
  color: #fff;
  transform: scale(0.95);
}

html[data-brand="snsclub"] .gantt-phase-complete-btn {
  border-color: #c9a227;
  color: #c9a227;
}

html[data-brand="snsclub"] .gantt-phase-complete-btn:active {
  background: #c9a227;
  color: #0f1f3a;
}

.gantt-phase-done-badge {
  flex-shrink: 0;
  padding: 4px 10px;
  border-radius: 8px;
  background: var(--ok);
  color: #fff;
  font-size: 0.72rem;
  font-weight: 700;
}

.gantt-step-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid #f8fafc;
}

.gantt-step-row:last-child {
  border-bottom: none;
}

.gantt-step-row.step-done {
  opacity: 0.6;
}

.gantt-step-row.step-current {
  background: #fffbeb;
  border-radius: 8px;
  padding: 8px 6px;
  margin: 0 -4px;
}

html[data-brand="snsclub"] .gantt-step-row.step-current {
  background: #f8f4e6;
}

.gantt-step-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid #d1d5db;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.15s;
  color: #94a3b8;
  font-family: inherit;
}

.gantt-step-icon:active {
  transform: scale(0.9);
}

.gantt-step-icon.done {
  border-color: var(--ok);
  background: var(--ok);
  color: #fff;
}

.gantt-step-icon.current {
  border-color: var(--brand);
  color: var(--brand);
  box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
  animation: pulse-node 2s ease-in-out infinite;
}

html[data-brand="snsclub"] .gantt-step-icon.current {
  border-color: #c9a227;
  color: #c9a227;
  box-shadow: 0 0 0 4px rgba(201, 162, 39, 0.18);
}

.gantt-step-name {
  font-size: 0.82rem;
  font-weight: 600;
  line-height: 1.3;
}

.gantt-step-row.step-done .gantt-step-name {
  text-decoration: line-through;
  color: var(--muted);
}

.gantt-step-info {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
}

.step-days {
  flex-shrink: 0;
  font-size: 0.68rem;
  font-weight: 600;
  color: var(--brand);
  background: rgba(14, 165, 233, 0.08);
  padding: 2px 8px;
  border-radius: 10px;
  white-space: nowrap;
}

.step-days.overdue {
  color: var(--warn, #ef4444);
  background: rgba(239, 68, 68, 0.08);
}

html[data-brand="snsclub"] .step-days {
  color: #c9a227;
  background: rgba(201, 162, 39, 0.1);
}

html[data-brand="snsclub"] .step-days.overdue {
  color: #ef4444;
  background: rgba(239, 68, 68, 0.08);
}

/* === Phase progress bar === */
.gantt-phase-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0 4px;
}

.gantt-phase-bar-track {
  flex: 1;
  height: 10px;
  background: #e2e8f0;
  border-radius: 5px;
  overflow: hidden;
}

.gantt-phase-bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.4s ease;
}

.gantt-phase-bar-fill.phase1-fill {
  background: linear-gradient(90deg, #60a5fa, #3b82f6);
}

.gantt-phase-bar-fill.phase2-fill {
  background: linear-gradient(90deg, #34d399, #10b981);
}

.gantt-phase-bar-fill.phase3-fill {
  background: linear-gradient(90deg, #a78bfa, #8b5cf6);
}

.gantt-phase-bar-fill.bar-complete {
  background: var(--ok) !important;
}

.gantt-phase-bar-pct {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--muted);
  min-width: 32px;
  text-align: right;
}

html[data-brand="snsclub"] .gantt-phase-bar-fill.phase1-fill {
  background: linear-gradient(90deg, #c9a227, #b89220);
}

html[data-brand="snsclub"] .gantt-phase-bar-fill.phase2-fill {
  background: linear-gradient(90deg, #1a3a6e, #142a50);
}

html[data-brand="snsclub"] .gantt-phase-bar-fill.phase3-fill {
  background: linear-gradient(90deg, #6b4c9a, #4c3575);
}

/* === Custom steps (追加プロセス) === */
.gantt-custom-phase {
  border-style: dashed;
  background: #fefef8;
}
.gantt-custom-phase.phase-complete {
  border-style: solid;
}
html[data-brand="snsclub"] .gantt-custom-phase {
  background: #faf8ef;
}
.custom-phase-fill {
  background: linear-gradient(90deg, #f59e0b, #d97706);
}
html[data-brand="snsclub"] .custom-phase-fill {
  background: linear-gradient(90deg, #c9a227, #a88520);
}
.gantt-add-step-btn {
  display: block;
  width: 100%;
  margin-top: 10px;
  padding: 10px 0;
  border: 2px dashed #d1d5db;
  border-radius: 12px;
  background: transparent;
  color: var(--muted);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.gantt-add-step-btn:active {
  border-color: var(--brand);
  color: var(--brand);
  background: rgba(14, 165, 233, 0.04);
}
html[data-brand="snsclub"] .gantt-add-step-btn:active {
  border-color: #c9a227;
  color: #c9a227;
  background: rgba(201, 162, 39, 0.06);
}
.custom-step-add-form {
  margin-top: 10px;
  padding: 12px;
  border: 2px solid var(--brand);
  border-radius: 12px;
  background: var(--surface);
}
html[data-brand="snsclub"] .custom-step-add-form {
  border-color: #c9a227;
}
.custom-step-add-form .input {
  margin-bottom: 6px;
}
.custom-step-add-hint {
  font-size: 0.7rem;
  color: var(--muted);
  margin: 0 0 10px;
  line-height: 1.4;
}
.custom-step-add-actions {
  display: flex;
  gap: 8px;
}
.custom-step-add-actions .btn {
  flex: 1;
}

.gantt-custom-step-del {
  flex-shrink: 0;
  width: 30px;
  height: 30px;
  border: none;
  background: none;
  color: var(--muted);
  font-size: 0.82rem;
  cursor: pointer;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
  transition: background 0.15s, color 0.15s;
}
.gantt-custom-step-del:active {
  background: #fee2e2;
  color: #ef4444;
}

/* === Post selector pills === */
.post-selector {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 0 0 10px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.post-selector::-webkit-scrollbar {
  display: none;
}

.post-pill {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 20px;
  border: 1.5px solid #d1d5db;
  background: #fff;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
  white-space: nowrap;
}

.post-pill.active {
  border-color: var(--brand);
  background: var(--brand);
  color: #fff;
}

.post-pill.completed {
  border-color: var(--ok);
  color: var(--ok);
}

.post-pill.completed.active {
  background: var(--ok);
  color: #fff;
}

html[data-brand="snsclub"] .post-pill.active {
  border-color: #c9a227;
  background: #c9a227;
  color: #0f1f3a;
}

html[data-brand="snsclub"] .post-pill.completed {
  border-color: var(--ok);
  color: var(--ok);
}

html[data-brand="snsclub"] .post-pill.completed.active {
  background: var(--ok);
  color: #fff;
}

/* === Record completed posts button === */
.record-btn-row {
  padding: 0 0 10px;
}

.btn-accent {
  display: block;
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #f59e0b, #d97706);
  color: #fff;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  text-align: center;
  transition: all 0.15s;
  box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
}

.btn-accent:active {
  transform: scale(0.97);
  opacity: 0.9;
}

/* === ペース設定 === */
.pace-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  padding: 2px 0;
}

.pace-toggle-icon {
  font-size: 0.75rem;
  color: var(--muted);
}

.pace-body {
  padding-top: 12px;
}

.pace-phase-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--muted);
  padding: 10px 0 4px;
  border-top: 1px solid #f1f5f9;
  margin-top: 4px;
}

.pace-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #f8fafc;
}

.pace-step-name {
  font-size: 0.85rem;
  font-weight: 600;
}

.pace-day-control {
  display: flex;
  align-items: center;
  gap: 6px;
}

.pace-btn {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1.5px solid #d1d5db;
  background: #fff;
  font-size: 1rem;
  font-weight: 700;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
  transition: all 0.1s;
}

.pace-btn:active {
  background: var(--bg);
  transform: scale(0.92);
}

.pace-day-value {
  min-width: 36px;
  text-align: center;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--brand);
}

.pace-total {
  margin-top: 12px;
  padding: 10px;
  background: var(--bg);
  border-radius: 10px;
  text-align: center;
  font-size: 0.88rem;
  color: var(--text);
}

/* home post mini cards */
.home-post-mini {
  padding: 10px 0;
  border-bottom: 1px solid #f1f5f9;
}

.home-post-mini:last-of-type {
  border-bottom: none;
}

.home-post-mini-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.home-post-mini-title {
  font-size: 0.9rem;
  font-weight: 700;
}

.home-post-mini-pct {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--brand);
}

.home-post-mini-step {
  font-size: 0.75rem;
  color: var(--brand);
  font-weight: 600;
  margin-top: 4px;
}

.home-post-mini-date {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 2px;
}

/* --- Home roadmap summary --- */
.home-rm-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 8px;
}

.home-rm-item {
  background: var(--bg);
  border-radius: 10px;
  padding: 10px;
  border: 1px solid #e2e8f0;
}

.home-rm-label {
  font-size: 0.72rem;
  color: var(--muted);
  font-weight: 600;
}

.home-rm-value {
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--text);
}

.home-rm-next {
  font-size: 0.78rem;
  font-weight: 600;
  padding: 6px 0;
  color: var(--brand);
}

html[data-brand="snsclub"] .home-rm-next {
  color: #c9a227;
}

.home-rm-pending {
  font-size: 0.75rem;
  color: var(--warn, #ef4444);
  font-weight: 600;
}

/* --- 入会直後「はじめのスプリント」バナー --- */
.early-sprint-banner {
  margin: 0 0 14px;
  padding: 14px 14px 12px;
  border-radius: 14px;
  background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 45%, #fde68a 100%);
  border: 2px solid rgba(217, 119, 6, 0.45);
  box-shadow: 0 4px 20px rgba(217, 119, 6, 0.12);
}

.early-sprint-banner--compact {
  margin-bottom: 10px;
  padding: 10px 12px 10px;
}

.early-sprint-badge {
  display: inline-block;
  font-size: 0.62rem;
  font-weight: 800;
  letter-spacing: 0.06em;
  color: #92400e;
  background: rgba(255, 255, 255, 0.7);
  border-radius: 999px;
  padding: 3px 10px;
  margin-bottom: 8px;
}

.early-sprint-title {
  margin: 0 0 6px;
  font-size: 0.95rem;
  font-weight: 800;
  color: #78350f;
  line-height: 1.45;
}

.early-sprint-banner--compact .early-sprint-title {
  font-size: 0.88rem;
}

.early-sprint-sub {
  margin: 0 0 8px;
  font-size: 0.78rem;
  color: #92400e;
  line-height: 1.5;
}

.early-sprint-banner--compact .early-sprint-sub {
  font-size: 0.72rem;
  margin-bottom: 6px;
}

.early-sprint-hint {
  margin: 0 0 8px;
  font-size: 0.76rem;
  color: #a16207;
  line-height: 1.5;
}

.early-sprint-dual {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.early-sprint-dual--sub {
  margin-top: -4px;
  margin-bottom: 10px;
}

.early-sprint-bar-track {
  flex: 1;
  min-width: 0;
  height: 8px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.75);
  border: 1px solid rgba(180, 83, 9, 0.28);
  overflow: hidden;
}

.early-sprint-bar-fill {
  height: 100%;
  border-radius: 999px;
  transition: width 0.35s ease;
}

@media (prefers-reduced-motion: reduce) {
  .early-sprint-bar-fill {
    transition: none;
  }
}

.early-sprint-bar-fill--time {
  background: linear-gradient(90deg, #f59e0b, #ea580c);
}

.early-sprint-bar-fill--posts {
  background: linear-gradient(90deg, #059669, #10b981);
}

.early-sprint-bar-lbl {
  font-size: 0.68rem;
  font-weight: 700;
  color: #713f12;
  white-space: nowrap;
}

.early-sprint-cta {
  margin-top: 4px;
  width: 100%;
}

html[data-brand="snsclub"] .early-sprint-banner {
  border-color: rgba(201, 162, 39, 0.55);
  box-shadow: 0 4px 20px rgba(201, 162, 39, 0.15);
}

/* === ロードマップタブ === */
.rm-tabs {
  display: flex;
  gap: 4px;
  padding: 0 0 10px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.rm-tabs::-webkit-scrollbar { display: none; }

.rm-tab {
  flex-shrink: 0;
  padding: 8px 14px;
  border-radius: 20px;
  border: 1.5px solid #d1d5db;
  background: #fff;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.rm-tab.active {
  border-color: var(--brand);
  background: var(--brand);
  color: #fff;
}

html[data-brand="snsclub"] .rm-tab.active {
  border-color: #c9a227;
  background: #c9a227;
  color: #0f1f3a;
}

/* --- Starter step cards --- */
.rm-step-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  margin-bottom: 4px;
  background: #fff;
  border-radius: 14px;
  border: 1px solid #f0f0f0;
  transition: all 0.15s;
}

.rm-step-card.done {
  opacity: 0.5;
  background: #fafafa;
}

.rm-step-check {
  flex-shrink: 0;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid #d1d5db;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  color: var(--muted);
  transition: all 0.15s;
}

.rm-step-card.done .rm-step-check {
  border-color: var(--ok);
  background: var(--ok);
  color: #fff;
}

.rm-step-body { flex: 1; min-width: 0; }

.rm-step-title {
  font-size: 0.84rem;
  font-weight: 500;
  line-height: 1.4;
  color: var(--text);
}

.rm-step-card.done .rm-step-title {
  text-decoration: line-through;
  color: var(--muted);
}

/* --- Post plan row (sync to schedule) --- */
.post-plan-row {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid #e8edf5;
}
.post-plan-label {
  margin: 0 0 6px !important;
  font-size: 0.72rem !important;
  color: var(--muted);
}
.post-plan-row-inner {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.post-plan-date-input {
  flex: 1;
  min-width: 140px;
}
.post-plan-hint {
  margin: 6px 0 0;
  font-size: 0.65rem;
  color: var(--muted);
  line-height: 1.45;
}

.post-workflow-done-row {
  margin: 12px 0 0;
  padding: 12px 12px;
  border-radius: 12px;
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
}
.post-workflow-done-label {
  margin: 0 0 6px !important;
  font-size: 0.72rem !important;
  color: #166534 !important;
}
.post-workflow-done-hint {
  margin: 8px 0 0;
  font-size: 0.65rem;
  color: #15803d;
  line-height: 1.45;
}
html[data-brand="snsclub"] .post-workflow-done-row {
  background: #fffdf7;
  border-color: rgba(201, 162, 39, 0.35);
}
html[data-brand="snsclub"] .post-workflow-done-label {
  color: #1a3a6e !important;
}
html[data-brand="snsclub"] .post-workflow-done-hint {
  color: var(--muted);
}

/* --- Post tab monthly rhythm（メイン作業の下に俯瞰用で表示） --- */
.post-heatmap-card {
  padding: 12px 14px 14px;
  margin-bottom: 10px;
}
.post-heatmap-card--below-posts {
  margin-top: 18px;
  border-style: dashed;
  border-color: #e2e8f0;
  background: #fafbfc;
}
.post-heatmap-month-stats {
  margin: 0 0 10px;
  padding: 10px 12px;
  border-radius: 12px;
  background: #fff;
  border: 1px solid #e8edf3;
}
.ph-month-stat-row {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px 10px;
  font-size: 0.82rem;
  line-height: 1.4;
  color: var(--text);
}
.ph-month-stat-row--sub {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid #f1f5f9;
  font-size: 0.76rem;
  color: var(--muted);
}
.ph-month-label {
  font-weight: 800;
  color: var(--text);
  margin-right: 4px;
}
.ph-month-val strong {
  font-weight: 800;
  color: var(--text);
}
.ph-month-val--done strong {
  color: #059669;
}
.ph-month-val--plan strong {
  color: #4f46e5;
}
.ph-month-sep {
  color: #cbd5e1;
  font-weight: 700;
}
.post-heatmap-head {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 8px;
}
.post-heatmap-title {
  margin: 0 !important;
}
.post-heatmap-nav {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.post-heatmap-nav-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
  background: #fff;
  font-size: 1.1rem;
  line-height: 1;
  cursor: pointer;
  color: var(--text);
  font-family: inherit;
}
.post-heatmap-month {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--text);
  flex: 1;
  min-width: 0;
}
.post-heatmap-today-btn {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  background: #f8fafc;
  font-size: 0.72rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  color: var(--muted);
}
.post-heatmap-legend {
  margin: 0 0 10px;
  font-size: 0.65rem;
  color: var(--muted);
  line-height: 1.5;
}
.ph-leg { font-weight: 700; margin-right: 2px; }
.ph-leg--plan { color: #6366f1; }
.ph-leg--done { color: #10b981; }
.post-heat-wd-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  margin-bottom: 4px;
}
.post-heat-wd {
  text-align: center;
  font-size: 0.58rem;
  font-weight: 700;
  color: var(--muted);
}
.post-heat-grid {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.post-heat-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.post-heat-cell {
  min-height: 38px;
  border-radius: 8px;
  border: 1px solid #e8edf3;
  background: #fff;
  padding: 3px 2px 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  font-size: 0.62rem;
  position: relative;
}
.post-heat-cell--has-data {
  background: #f1f5f9;
  border-color: #cbd5e1;
}
.post-heat-cell--muted {
  opacity: 0.38;
}
.post-heat-cell--today {
  outline: 2px solid var(--brand);
  outline-offset: -1px;
}
.post-heat-day {
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
}
.post-heat-dot-stack {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  margin-top: 3px;
  min-height: 12px;
}
.post-heat-dot-stack--one-pochi {
  flex-direction: row;
  flex-wrap: wrap;
  justify-content: center;
  gap: 4px 6px;
}
.post-heat-metric {
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.ph-metric-count {
  font-size: 0.62rem;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
  min-width: 1em;
}
.post-heat-metric--done .ph-metric-count {
  color: #059669;
}
.post-heat-metric--plan .ph-metric-count {
  color: #4f46e5;
}
.post-heat-dot-row {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  align-items: center;
  gap: 3px;
  max-width: 100%;
}
.ph-round {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ph-round--plan {
  background: #6366f1;
  box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.2);
}
.ph-round--done {
  width: 8px;
  height: 8px;
  background: #10b981;
  box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.25);
}
.ph-round-more {
  font-size: 0.48rem;
  font-weight: 800;
  color: #64748b;
  line-height: 1;
}

.rm-session-bulk-posts-card {
  margin-bottom: 14px;
}

/* --- Post add card (compact) --- */
.post-add-card { padding: 12px 14px; }
.post-add-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.rm-step-meta {
  font-size: 0.68rem;
  color: var(--muted);
  margin-top: 2px;
}

.rm-done-date {
  color: var(--ok);
  font-weight: 600;
}

.rm-step-linked {
  color: var(--brand);
  font-weight: 600;
  font-size: 0.65rem;
}

html[data-brand="snsclub"] .rm-step-linked {
  color: #c9a227;
}

/* --- Milestone roadmap --- */
.rm-milestone-current {
  margin: 0 0 16px;
  padding: 0 0 14px;
  border-bottom: 3px solid var(--brand, #3b82f6);
}

.rm-milestone-current-kicker {
  margin: 0 0 8px;
  font-size: 0.7rem;
  font-weight: 800;
  letter-spacing: 0.06em;
  color: var(--muted);
}

.rm-milestone-current-head {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 8px;
}

.rm-milestone-current-ico {
  font-size: 1.45rem;
  line-height: 1.15;
  flex-shrink: 0;
}

.rm-milestone-current-title {
  margin: 0;
  flex: 1;
  min-width: 0;
  font-size: 1.12rem;
  font-weight: 800;
  line-height: 1.35;
  color: var(--text);
}

.rm-milestone-current-title--done {
  color: var(--ok, #16a34a);
}

.rm-milestone-current-sub {
  margin: 0 0 10px;
  font-size: 0.78rem;
  line-height: 1.5;
  color: var(--muted);
  font-weight: 500;
}

.rm-milestone-current-sub strong {
  color: var(--text);
  font-weight: 800;
}

.rm-milestone-current-postline {
  margin: 0;
  padding-top: 10px;
  border-top: 1px solid #e2e8f0;
  font-size: 0.74rem;
  color: var(--muted);
  font-weight: 600;
}

.rm-milestone-current-postline strong {
  font-size: 0.88rem;
  font-weight: 800;
  color: var(--text);
}

html[data-brand="snsclub"] .rm-milestone-current {
  border-bottom-color: #c9a227;
}

.rm-milestone.rm-milestone--focus {
  background: rgba(59, 130, 246, 0.07);
  border-radius: 12px;
  padding: 10px 10px;
  margin: 4px 0;
}

html[data-brand="snsclub"] .rm-milestone.rm-milestone--focus {
  background: rgba(201, 162, 39, 0.12);
}

.rm-milestone {
  display: flex;
  gap: 12px;
  padding: 8px 0;
}

.rm-ms-icon-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 44px;
  flex-shrink: 0;
}

.rm-ms-icon {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: #f8f8f8;
  border: 2px solid #e0e0e0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
}

.rm-ms-icon.done {
  border-color: var(--ok);
  background: #dcfce7;
  animation: medal-pop 0.3s ease;
}

.rm-milestone.post-medal .rm-ms-icon.done {
  border-color: #f59e0b;
  background: linear-gradient(135deg, #fef3c7, #fde68a);
  box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
}

@keyframes medal-pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.rm-ms-line {
  width: 2px;
  flex: 1;
  min-height: 16px;
  background: #e2e8f0;
  margin: 4px 0;
}

.rm-ms-line.done { background: var(--ok); }

.rm-ms-body {
  flex: 1;
  min-width: 0;
  padding: 6px 0;
}

.rm-ms-title {
  font-size: 0.82rem;
  font-weight: 600;
  line-height: 1.4;
}

.rm-milestone.achieved .rm-ms-title {
  color: var(--ok);
}

.rm-ms-status {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 2px;
}

.rm-ms-status.achieved {
  color: var(--ok);
  font-weight: 700;
}

.rm-ms-done-btn {
  margin-top: 4px;
  padding: 4px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--brand);
  background: #fff;
  color: var(--brand);
  font-size: 0.7rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}

.rm-ms-done-btn:active {
  background: var(--brand);
  color: #fff;
}

html[data-brand="snsclub"] .rm-ms-done-btn {
  border-color: #c9a227;
  color: #c9a227;
}

html[data-brand="snsclub"] .rm-ms-done-btn:active {
  background: #c9a227;
  color: #0f1f3a;
}

/* --- Recurring tasks --- */
.rm-recurring {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid #f1f5f9;
}

.rm-recurring:last-child { border-bottom: none; }

.rm-recurring-icon { font-size: 1.1rem; }

.rm-recurring-title {
  flex: 1;
  font-size: 0.82rem;
  font-weight: 600;
}

.rm-recurring-freq {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--brand);
  background: rgba(14, 165, 233, 0.08);
  padding: 2px 8px;
  border-radius: 10px;
}

html[data-brand="snsclub"] .rm-recurring-freq {
  color: #c9a227;
  background: rgba(201, 162, 39, 0.1);
}

/* --- Session task cards --- */
.rm-session-register-card {
  margin-bottom: 10px;
}
.rm-session-register-card--hint-only {
  background: #f8fafc;
  border-style: dashed;
}
.rm-session-create-next-wrap {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed #e2e8f0;
}
.rm-session-create-next-title {
  margin: 0 0 8px;
  font-size: 0.8rem;
  font-weight: 800;
  color: var(--text);
}
.rm-session-card {
  padding-bottom: 6px;
  border: 1px solid #f0f0f0;
  box-shadow: none;
}

.rm-session-card-top {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px 12px;
  margin-bottom: 8px;
  padding-bottom: 8px;
  border-bottom: 1px solid #e2e8f0;
}

.rm-session-card--all-tasks-done {
  border-color: rgba(34, 197, 94, 0.4);
  box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.1);
}

.rm-session-progress-wrap {
  margin: -4px 0 10px;
  padding: 0 2px;
}

.rm-session-progress-line {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 6px;
}

.rm-session-progress-line .rm-session-count {
  margin-left: 0;
}

.rm-session-all-done-badge {
  font-size: 0.68rem;
  font-weight: 800;
  color: #15803d;
  background: rgba(34, 197, 94, 0.14);
  padding: 2px 10px;
  border-radius: 10px;
}

html[data-brand="snsclub"] .rm-session-all-done-badge {
  color: #166534;
  background: rgba(22, 101, 52, 0.12);
}

.rm-session-progress-track {
  height: 7px;
  border-radius: 999px;
  background: #e2e8f0;
  overflow: hidden;
}

.rm-session-progress-fill {
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--brand), #0ea5e9);
  transition: width 0.35s ease;
}

.rm-session-card--all-tasks-done .rm-session-progress-fill {
  background: linear-gradient(90deg, #22c55e, #16a34a);
}

html[data-brand="snsclub"] .rm-session-progress-fill {
  background: linear-gradient(90deg, #c9a227, #d4a017);
}

html[data-brand="snsclub"] .rm-session-card--all-tasks-done .rm-session-progress-fill {
  background: linear-gradient(90deg, #22c55e, #15803d);
}

.rm-session-check-all-row {
  margin: 8px 0 4px;
}

.rm-session-check-all-btn {
  width: 100%;

/* スケジュール：予定追加ボトムシート（Googleカレンダー風） */
.schedule-add-sheet {
  position: fixed;
  left: 0;
  right: 0;
  top: 0;
  bottom: 0;
  z-index: 500;
  pointer-events: none;
  visibility: hidden;
}
.schedule-add-sheet--open {
  pointer-events: auto;
  visibility: visible;
}
.schedule-add-sheet-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(15, 23, 42, 0.48);
  opacity: 0;
  transition: opacity 0.28s ease;
}
.schedule-add-sheet--open .schedule-add-sheet-backdrop {
  opacity: 1;
}
.schedule-add-sheet-panel {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  max-height: min(92vh, 640px);
  background: var(--surface);
  border-radius: 18px 18px 0 0;
  box-shadow: 0 -10px 48px rgba(15, 23, 42, 0.2);
  display: flex;
  flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.34s cubic-bezier(0.32, 0.72, 0, 1);
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.schedule-add-sheet--open .schedule-add-sheet-panel {
  transform: translateY(0);
}
.schedule-add-sheet-handle {
  width: 40px;
  height: 5px;
  border-radius: 3px;
  background: #e2e8f0;
  margin: 10px auto 4px;
  flex-shrink: 0;
}
.schedule-add-sheet-toolbar {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 8px;
  padding: 4px 8px 12px;
  border-bottom: 1px solid #e2e8f0;
  flex-shrink: 0;
}
.schedule-add-sheet-tb-btn {
  border: none;
  background: transparent;
  font-family: inherit;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  padding: 8px 4px;
  color: var(--brand);
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
}
.schedule-add-sheet-cancel {
  color: var(--muted);
  font-weight: 600;
}
.schedule-add-sheet-save {
  font-weight: 700;
  color: var(--brand);
}
html[data-brand="snsclub"] .schedule-add-sheet-save {
  color: #c9a227;
}
.schedule-add-sheet-title {
  flex: 1;
  min-width: 0;
  font-size: 0.82rem;
  font-weight: 800;
  color: var(--text);
  text-align: center;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.schedule-add-sheet-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 14px 20px;
  -webkit-overflow-scrolling: touch;
}
.schedule-add-sheet-body .schedule-add-card-inner {
  margin-bottom: 14px;
}
.schedule-add-sheet-body .sched-session-card {
  margin-top: 0;
  margin-bottom: 0;
  border: 1px solid #e2e8f0;
  box-shadow: none;
}
body.schedule-sheet-lock {
  overflow: hidden;
  touch-action: none;
}

/* PC・タブレット：予定追加シートを中央下のカード風に */
@media (min-width: 769px) {
  .schedule-add-sheet-panel {
    left: 50%;
    right: auto;
    width: min(440px, calc(100vw - 48px));
    bottom: max(20px, env(safe-area-inset-bottom, 0px));
    max-height: min(calc(100vh - 40px), 620px);
    border-radius: 16px;
    box-shadow: 0 24px 64px rgba(15, 23, 42, 0.22);
    transform: translate(-50%, calc(100% + 40px));
  }
  .schedule-add-sheet--open .schedule-add-sheet-panel {
    transform: translate(-50%, 0);
  }
  .schedule-add-sheet-handle {
    display: none;
  }
  .schedule-add-sheet-toolbar {
    padding-top: 8px;
  }
}

@media (hover: hover) and (pointer: fine) {
  .schedule-add-sheet-tb-btn:hover {
    filter: brightness(0.92);
  }
  .schedule-add-sheet-save:hover {
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .schedule-add-sheet-backdrop {
    cursor: pointer;
  }
}

@media (prefers-reduced-motion: reduce) {
  .schedule-add-sheet-backdrop,
  .schedule-add-sheet-panel {
    transition-duration: 0.05s;
  }
}

  function uid(prefix) {
    return prefix + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
  }

  function loadDb() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        db = JSON.parse(raw);
        if (!Array.isArray(db.messages)) db.messages = [];
        if (!Array.isArray(db.consultations)) db.consultations = [];
        if (!Array.isArray(db.bookings)) db.bookings = [];
        if (!Array.isArray(db.memos)) db.memos = [];
        if (!Array.isArray(db.posts)) db.posts = [];
        if (!Array.isArray(db.starterSteps)) db.starterSteps = [];
        if (!Array.isArray(db.starterProgress)) db.starterProgress = [];
        if (!Array.isArray(db.milestoneProgress)) db.milestoneProgress = [];
        if (!Array.isArray(db.coachingSessions)) db.coachingSessions = [];
        if (!Array.isArray(db.activityLog)) db.activityLog = [];
        if (!Array.isArray(db.passwordResetTokens)) db.passwordResetTokens = [];
        if (!Array.isArray(db.sessionTaskLibrary)) db.sessionTaskLibrary = [];
        migrateDbAll();
        return;
      }
    } catch (e) {
      console.warn(e);
    }
    seedDb();
    migrateDbAll();
    saveDb();
  }

  function migrateDbAll() {
    migrateDbMilestones();
    migrateDbProfiles();
    migrateDbBookings();
    migrateDbMemos();
