<!DOCTYPE html>
<html lang="ja" data-brand="snsclub">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a6e" id="metaThemeColor" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>じょーず - デモ共有版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
/* じょーず – モバイル投稿管理アプリ
 * ブランド切替: html[data-brand="snsclub"] 生徒向け（SnsClub 系・ネイビー＋ゴールド）
 *              html[data-brand="levela"]  運営・MG等（Levela 系・レッド～オレンジ）
 */
:root {
  --bg: #f1f5f9;
  --surface: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --brand: #0ea5e9;
  --brand-dark: #0284c7;
  --brand-ink: #ffffff;
  --header-shadow: rgba(14, 165, 233, 0.25);
  --ok: #10b981;
  --warn: #d97706;
  --danger: #dc2626;
  --radius: 14px;
  --nav-h: 64px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  font-family: "Noto Sans JP", system-ui, sans-serif;
}

/* ① 生徒が触れるサービス色（SnsClub：ディープネイビー × ゴールド） */
html[data-brand="snsclub"] {
  --bg: #f4f6fb;
  --brand: #c9a227;
  --brand-dark: #1a2f52;
  --brand-ink: #0f1f3a;
  --header-shadow: rgba(26, 47, 82, 0.35);
}

html[data-brand="snsclub"] .app-header {
  background: linear-gradient(145deg, #0f1f3a 0%, #1a3a6e 42%, #142a50 100%);
  box-shadow: 0 2px 16px var(--header-shadow);
  border-bottom: 3px solid #c9a227;
}

html[data-brand="snsclub"] .btn-primary {
  background: linear-gradient(180deg, #e3c657 0%, #c9a227 55%, #b89220 100%);
  color: var(--brand-ink);
  box-shadow: 0 2px 8px rgba(26, 47, 82, 0.2);
}

html[data-brand="snsclub"] .btn-secondary {
  background: #e2eaf8;
  color: var(--brand-dark);
}

html[data-brand="snsclub"] .type-post {
  background: #dde7f7;
}

html[data-brand="snsclub"] .stat-box {
  background: linear-gradient(180deg, #eef2fa 0%, #e2eaf8 100%);
}

/* ② 会社ロゴ色（Levela：レッド～オレンジのグラデ） */
html[data-brand="levela"] {
  --bg: #faf5f5;
  --brand: #e11d48;
  --brand-dark: #881337;
  --brand-ink: #ffffff;
  --header-shadow: rgba(185, 28, 28, 0.35);
}

html[data-brand="levela"] .app-header {
  background: linear-gradient(130deg, #881337 0%, #dc2626 38%, #ea580c 72%, #f59e0b 100%);
  box-shadow: 0 2px 16px var(--header-shadow);
}

html[data-brand="levela"] .btn-primary {
  background: linear-gradient(180deg, #f43f5e 0%, #e11d48 50%, #be123c 100%);
  color: #fff;
  box-shadow: 0 2px 10px rgba(190, 18, 60, 0.35);
}

html[data-brand="levela"] .btn-secondary {
  background: #ffe4e6;
  color: #9f1239;
}

html[data-brand="levela"] .type-post {
  background: #ffe4e6;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

html {
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: calc(var(--nav-h) + var(--safe-b) + 8px);
}

.app-header {
  position: sticky;
  top: 0;
  z-index: 20;
  /* data-brand 未定時のフォールバック（ログイン前は snsclub と同系） */
  background: linear-gradient(145deg, #0f1f3a 0%, #1a3a6e 100%);
  color: #fff;
  padding: 12px 16px calc(12px + env(safe-area-inset-top, 0));
  padding-top: calc(12px + env(safe-area-inset-top, 0));
  box-shadow: 0 2px 12px var(--header-shadow);
}

.quick-consult-btn {
  position: absolute;
  right: 14px;
  top: calc(10px + env(safe-area-inset-top, 0));
  width: 56px;
  height: 42px;
  border-radius: 12px;
  border: none;
  background: #ffffff;
  color: var(--brand-dark);
  font-size: 0.78rem;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 2px 10px rgba(15, 23, 42, 0.2);
}

.app-header h1 {
  margin: 0;
  font-size: 1.05rem;
  font-weight: 700;
}

.app-header .sub {
  margin: 4px 0 0;
  font-size: 0.75rem;
  opacity: 0.9;
}

.screen {
  display: none;
  padding: 16px;
  max-width: 480px;
  margin: 0 auto;
  animation: fadeIn 0.2s ease;
}

.screen.active {
  display: block;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
  border: 1px solid #e2e8f0;
}

.card-title {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin: 0 0 8px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px 18px;
  font-size: 1rem;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.08s ease, opacity 0.15s;
}

.btn:active {
  transform: scale(0.98);
}

.btn-primary {
  background: var(--brand);
  color: #fff;
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.btn-secondary {
  background: #e0f2fe;
  color: var(--brand-dark);
}

.btn-ghost {
  background: transparent;
  color: var(--muted);
  padding: 10px;
}

.btn-small {
  padding: 10px 14px;
  font-size: 0.9rem;
  width: auto;
}

.input {
  width: 100%;
  padding: 14px 14px;
  font-size: 1rem;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  margin-bottom: 12px;
  font-family: inherit;
}

.input:focus {
  outline: none;
  border-color: var(--brand);
}

textarea.input {
  resize: vertical;
  min-height: 64px;
  line-height: 1.5;
}

.label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 6px;
}

.task-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 0;
  border-bottom: 1px solid #f1f5f9;
}

.task-row:last-child {
  border-bottom: none;
}

.task-type-badge {
  flex-shrink: 0;
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
}

.type-post {
  background: #dbeafe;
}
.type-session {
  background: #d1fae5;
}
.type-lecture {
  background: #fef3c7;
}
.type-other {
  background: #e2e8f0;
}

.progress-track {
  height: 8px;
  background: #e2e8f0;
  border-radius: 4px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-fill {
  height: 100%;
  background: var(--brand);
  border-radius: 4px;
  transition: width 0.3s ease;
}

.progress-fill.done {
  background: var(--ok);
}

.due-soon {
  color: var(--warn);
  font-weight: 600;
  font-size: 0.8rem;
}
.due-over {
  color: var(--danger);
  font-weight: 600;
  font-size: 0.8rem;
}

.bottom-nav {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 30;
  background: var(--surface);
  border-top: 1px solid #e2e8f0;
  display: flex;
  justify-content: space-around;
  align-items: center;
  height: calc(var(--nav-h) + var(--safe-b));
  padding-bottom: var(--safe-b);
  box-shadow: 0 -4px 20px rgba(15, 23, 42, 0.06);
}

.bottom-nav button {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 8px 4px;
  border: none;
  background: none;
  font-size: 0.65rem;
  color: var(--muted);
  cursor: pointer;
  font-family: inherit;
}

.bottom-nav button .icon {
  font-size: 1.35rem;
  line-height: 1;
}

.bottom-nav button.active {
  color: var(--brand);
  font-weight: 700;
}

.role-chip {
  display: inline-block;
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.25);
  margin-top: 6px;
}

.demo-grid {
  display: grid;
  gap: 8px;
  margin-top: 16px;
}

.quick-login {
  text-align: left;
  padding: 12px 14px;
  border-radius: 12px;
  border: 2px solid #e2e8f0;
  background: #fff;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.85rem;
}

.quick-login strong {
  display: block;
  margin-bottom: 2px;
  color: var(--text);
}

.quick-login span {
  color: var(--muted);
  font-size: 0.75rem;
}

.empty-state {
  text-align: center;
  padding: 32px 16px;
  color: var(--muted);
  font-size: 0.9rem;
}

.student-picker {
  width: 100%;
  padding: 12px;
  font-size: 1rem;
  border-radius: 12px;
  border: 2px solid #e2e8f0;
  margin-bottom: 16px;
  font-family: inherit;
  background: #fff;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 8px;
}

.stat-box {
  background: #f8fafc;
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
}

.stat-box .num {
  font-size: 1.25rem;
  font-weight: 800;
  color: var(--brand);
}

.stat-box .lbl {
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 4px;
}

.hidden {
  display: none !important;
}

.milestone-hint {
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.5;
  margin: 0 0 14px;
}

.milestone-computed {
  margin: 12px 0 0;
  padding: 12px;
  border-radius: 10px;
  background: var(--bg);
  border: 1px solid #e2e8f0;
  font-size: 0.9rem;
}

.milestone-computed strong {
  font-size: 1.05rem;
}

.mline-mini {
  display: block;
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 4px;
}

/* === マイページ === */
.avatar-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}

.avatar-circle {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--bg);
  border: 3px solid #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}

.avatar-circle img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.avatar-circle .avatar-placeholder {
  color: var(--muted);
  font-size: 2rem;
  line-height: 1;
}

.avatar-change {
  font-size: 0.75rem;
  color: var(--brand);
  font-weight: 600;
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
}

.sns-links {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 8px;
}

.sns-link-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg);
  border-radius: 10px;
  text-decoration: none;
  color: var(--text);
  font-size: 0.9rem;
  transition: background 0.15s;
}

.sns-link-row:active {
  background: #e2e8f0;
}

.sns-link-row .sns-icon {
  flex-shrink: 0;
  width: 28px;
  text-align: center;
  font-size: 1.1rem;
}

.sns-link-row .sns-handle {
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.sns-link-row .sns-arrow {
  flex-shrink: 0;
  color: var(--muted);
  font-size: 0.8rem;
}

.stat-banner {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 8px;
}

.stat-banner .stat-box {
  padding: 14px 10px;
}

.contact-mg-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 2px solid var(--brand);
  background: var(--surface);
  color: var(--brand);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.15s;
}

.contact-mg-btn:active {
  background: var(--bg);
}

/* === チャット === */
.chat-back {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  border: none;
  background: none;
  color: var(--brand);
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  padding: 0 0 12px;
}

.chat-messages {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 55vh;
  overflow-y: auto;
  padding: 4px 0 12px;
  -webkit-overflow-scrolling: touch;
}

.chat-bubble {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 0.9rem;
  line-height: 1.5;
  word-break: break-word;
}

.chat-bubble.mine {
  align-self: flex-end;
  background: var(--brand);
  color: #fff;
  border-bottom-right-radius: 4px;
}

.chat-bubble.theirs {
  align-self: flex-start;
  background: #e2e8f0;
  color: var(--text);
  border-bottom-left-radius: 4px;
}

.chat-bubble .chat-time {
  display: block;
  font-size: 0.65rem;
  opacity: 0.7;
  margin-top: 4px;
}

.chat-input-row {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

.chat-input-row input {
  flex: 1;
  padding: 12px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  font-size: 1rem;
  font-family: inherit;
}

.chat-input-row input:focus {
  outline: none;
  border-color: var(--brand);
}

.chat-send-btn {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  border-radius: 12px;
  border: none;
  background: var(--brand);
  color: #fff;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chat-send-btn:active {
  opacity: 0.8;
}

/* === ロードマップ === */
.roadmap {
  position: relative;
  padding: 24px 0 16px;
}

.roadmap-title {
  text-align: center;
  font-size: 1.05rem;
  font-weight: 700;
  margin: 0 0 4px;
}

.roadmap-sub {
  text-align: center;
  font-size: 0.8rem;
  color: var(--muted);
  margin: 0 0 20px;
}

.roadmap-path {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 0;
  padding: 0 8px;
}

.rmap-segment {
  position: relative;
  display: flex;
  align-items: flex-start;
  min-height: 124px;
}

.rmap-segment:last-child {
  min-height: auto;
}

.rmap-segment.align-left {
  flex-direction: row;
}

.rmap-segment.align-right {
  flex-direction: row;
}

.rmap-node-col {
  position: relative;
  flex-shrink: 0;
  width: 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  z-index: 2;
}

.rmap-road {
  position: absolute;
  top: 56px;
  bottom: -68px;
  left: 50%;
  width: 3px;
  margin-left: -1.5px;
  background: #d1d5db;
  border-radius: 3px;
  z-index: 0;
}

.rmap-road.active {
  background: var(--brand);
}

.rmap-circle {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
  border: 4px solid #cbd5e1;
  background: #fff;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  z-index: 2;
  position: relative;
}

.rmap-circle:active {
  transform: scale(0.95);
}

.rmap-circle.status-done {
  border-color: var(--brand-dark);
  background: var(--brand-dark);
  color: #fff;
  box-shadow: 0 2px 10px rgba(15, 23, 42, 0.2);
}

.rmap-circle.status-current {
  border-color: var(--brand);
  background: #fff;
  color: var(--brand);
  box-shadow: 0 0 0 7px rgba(14, 165, 233, 0.22), 0 2px 14px rgba(14, 165, 233, 0.2);
  animation: pulse-node 2s ease-in-out infinite;
}

html[data-brand="snsclub"] .rmap-circle.status-current {
  border-color: #c9a227;
  background: #fff;
  color: #c9a227;
  box-shadow: 0 0 0 7px rgba(201, 162, 39, 0.26), 0 2px 14px rgba(201, 162, 39, 0.24);
}

.rmap-circle.status-locked {
  border-color: #e2e8f0;
  background: #f1f5f9;
  color: #94a3b8;
  cursor: default;
}

.rmap-segment.inactive .rmap-circle {
  border-color: #d1d5db;
  background: #eef2f7;
  color: #94a3b8;
  box-shadow: none;
  animation: none;
}

.rmap-segment.inactive .rmap-label,
.rmap-segment.inactive .rmap-name,
.rmap-segment.inactive .rmap-date,
.rmap-segment.inactive .rmap-progress-mini {
  opacity: 0.58;
}

@keyframes pulse-node {
  0%, 100% { box-shadow: 0 2px 14px rgba(14, 165, 233, 0.4); }
  50% { box-shadow: 0 2px 24px rgba(14, 165, 233, 0.6); }
}

html[data-brand="snsclub"] @keyframes pulse-node {
  0%, 100% { box-shadow: 0 2px 14px rgba(201, 162, 39, 0.5); }
  50% { box-shadow: 0 2px 24px rgba(201, 162, 39, 0.7); }
}

.rmap-info {
  flex: 1;
  padding: 6px 12px;
  min-width: 0;
}

.rmap-label {
  font-size: 0.7rem;
  color: var(--muted);
  margin: 0 0 2px;
}

.rmap-name {
  font-size: 0.95rem;
  font-weight: 700;
  margin: 0;
  line-height: 1.3;
}

.rmap-date {
  font-size: 0.75rem;
  color: var(--muted);
  margin: 4px 0 0;
}

.rmap-date.celebrate {
  color: var(--brand-dark);
  font-weight: 600;
}

.rmap-detail {
  margin-top: 10px;
  background: var(--surface);
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 14px;
  animation: fadeIn 0.2s ease;
}

.rmap-detail-title {
  font-size: 0.8rem;
  font-weight: 700;
  margin: 0 0 10px;
  color: var(--brand-dark);
}

.rmap-detail .task-row {
  padding: 10px 0;
}

.rmap-progress-mini {
  height: 4px;
  background: #e2e8f0;
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}

.rmap-progress-mini .fill {
  height: 100%;
  background: var(--brand);
  border-radius: 2px;
  transition: width 0.4s ease;
}

.rmap-progress-mini .fill.done {
  background: var(--brand-dark);
}

.rmap-current-tag {
  position: absolute;
  right: -16px;
  top: -12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.62rem;
  font-weight: 700;
  color: #fff;
  background: var(--brand);
  border-radius: 999px;
  padding: 2px 7px;
  line-height: 1.1;
}

html[data-brand="snsclub"] .rmap-current-tag {
  background: #c9a227;
  color: #0f1f3a;
}

/* === 目標カード (My Vision) === */
.vision-card {
  border: 2px solid #c9a227;
  border-radius: 16px;
  padding: 0;
  margin-bottom: 12px;
  overflow: hidden;
  background: var(--surface);
}

html[data-brand="levela"] .vision-card {
  border-color: #e11d48;
}

.vision-header {
  background: linear-gradient(135deg, #0f1f3a 0%, #1a3a6e 100%);
  color: #fff;
  padding: 14px 16px 10px;
  text-align: center;
  position: relative;
}

html[data-brand="levela"] .vision-header {
  background: linear-gradient(135deg, #881337 0%, #dc2626 100%);
}

.vision-header .vh-label {
  font-size: 0.65rem;
  opacity: 0.8;
  letter-spacing: 0.06em;
  margin: 0 0 2px;
  text-transform: uppercase;
}

.vision-header .vh-name {
  font-size: 1rem;
  font-weight: 700;
  margin: 0;
}

.vision-edit-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  border: 1px solid rgba(255, 255, 255, 0.45);
  background: rgba(255, 255, 255, 0.18);
  color: #fff;
  border-radius: 999px;
  font-size: 0.72rem;
  padding: 6px 10px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 700;
}

.profile-main-card {
  position: relative;
}

.card-edit-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  border: 1px solid #cbd5e1;
  background: #fff;
  color: var(--muted);
  border-radius: 999px;
  font-size: 0.72rem;
  padding: 6px 10px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 700;
}

.vision-body {
  padding: 14px 16px 16px;
}

.vision-item {
  padding: 12px 0;
  border-bottom: 1px solid #f1f5f9;
}

.vision-item:last-child {
  border-bottom: none;
  padding-bottom: 0;
}

.vision-item .vi-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
  margin: 0 0 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.vision-item .vi-text {
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.5;
  margin: 0;
  white-space: pre-wrap;
  word-break: break-word;
}

.vision-item .vi-text.empty {
  color: var(--muted);
  font-weight: 400;
  font-style: italic;
}

.vision-edit-hint {
  text-align: center;
  font-size: 0.7rem;
  color: var(--brand);
  font-weight: 600;
  padding: 0 16px 12px;
  cursor: pointer;
}

.vision-pace {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  background: var(--bg);
  border: 1px solid #e2e8f0;
}

.vp-head {
  margin: 0;
  font-size: 0.82rem;
  line-height: 1.5;
}

.vp-sub {
  margin: 4px 0 8px;
  font-size: 0.72rem;
  color: var(--muted);
}

.vp-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.vp-chip {
  font-size: 0.7rem;
  padding: 4px 8px;
  border-radius: 999px;
  background: #e2e8f0;
  color: var(--text);
  font-weight: 600;
}

/* === 次の投稿予定 === */
.next-post-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  border-radius: 14px;
  background: var(--surface);
  border: 1px solid #e2e8f0;
  margin-bottom: 12px;
}

.next-post-icon {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, #dbeafe, #bfdbfe);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
}

html[data-brand="snsclub"] .next-post-icon {
  background: linear-gradient(135deg, #e2eaf8, #c7d4ed);
}

.next-post-info {
  flex: 1;
  min-width: 0;
}

.next-post-info .np-label {
  font-size: 0.7rem;
  color: var(--muted);
  margin: 0 0 2px;
}

.next-post-info .np-date {
  font-size: 1.05rem;
  font-weight: 700;
  margin: 0;
}

.next-post-info .np-days {
  font-size: 0.8rem;
  margin: 2px 0 0;
}

/* === 相談（ボイスメモ + 要約） === */
.consult-record-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 18px;
  border-radius: 16px;
  border: 3px dashed #e2e8f0;
  background: var(--surface);
  color: var(--text);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.consult-record-btn:active {
  transform: scale(0.98);
}

.consult-record-btn.recording {
  border-color: var(--danger);
  background: #fef2f2;
  color: var(--danger);
  animation: pulse-rec 1.5s ease-in-out infinite;
}

@keyframes pulse-rec {
  0%, 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.2); }
  50% { box-shadow: 0 0 0 12px rgba(220, 38, 38, 0); }
}

.consult-transcript {
  background: var(--bg);
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 14px;
  font-size: 0.9rem;
  line-height: 1.6;
  margin-top: 12px;
  min-height: 60px;
  white-space: pre-wrap;
  word-break: break-word;
}

.consult-summary-card {
  background: linear-gradient(135deg, #ecfdf5, #d1fae5);
  border: 1px solid #6ee7b7;
  border-radius: 12px;
  padding: 14px;
  margin-top: 12px;
}

.consult-summary-card .cs-label {
  font-size: 0.7rem;
  font-weight: 600;
  color: #065f46;
  margin: 0 0 6px;
}

.consult-summary-card .cs-text {
  font-size: 0.9rem;
  font-weight: 600;
  color: #064e3b;
  margin: 0 0 8px;
  line-height: 1.5;
}

.consult-categories {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 8px;
}

.consult-cat-chip {
  font-size: 0.7rem;
  padding: 4px 10px;
  border-radius: 999px;
  background: #d1fae5;
  color: #065f46;
  font-weight: 600;
}

.consult-or {
  text-align: center;
  font-size: 0.8rem;
  color: var(--muted);
  margin: 12px 0;
}

/* === schedule === */
.schedule-key-dates {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.schedule-key-box {
  background: var(--bg);
  border: 1px solid #e2e8f0;
  border-radius: 10px;
  padding: 10px;
}

.schedule-key-box span {
  display: block;
  font-size: 0.72rem;
  color: var(--muted);
}

.schedule-key-box strong {
  display: block;
  margin-top: 4px;
  font-size: 0.92rem;
}

.schedule-scroll {
  max-height: 56vh;
  overflow: auto;
  padding-right: 2px;
}

.schedule-day-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 0;
  border-bottom: 1px solid #f1f5f9;
}

.schedule-day-row.today {
  background: #fffbeb;
}

.schedule-day-date {
  min-width: 130px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  font-size: 0.8rem;
}

.schedule-day-date .dnum {
  font-size: 0.68rem;
  color: var(--muted);
}

.schedule-day-items {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: flex-end;
}

.schedule-cat-chip {
  font-size: 0.7rem;
  padding: 4px 8px;
  border-radius: 999px;
  background: #e2e8f0;
  color: var(--text);
  font-weight: 600;
}

.schedule-day-empty {
  font-size: 0.72rem;
  color: var(--muted);
}

/* --- Calendar view tabs & nav --- */
.cal-view-tabs {
  display: flex;
  gap: 4px;
  padding: 0 0 8px;
}

.cal-view-tab {
  flex: 1;
  padding: 8px;
  border-radius: 10px;
  border: 1.5px solid #d1d5db;
  background: #fff;
  font-size: 0.82rem;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.cal-view-tab.active {
  border-color: var(--brand);
  background: var(--brand);
  color: #fff;
}

html[data-brand="snsclub"] .cal-view-tab.active {
  border-color: #c9a227;
  background: #c9a227;
  color: #0f1f3a;
}

.cal-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 6px 0 12px;
}

.cal-nav-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid #d1d5db;
  background: #fff;
  font-size: 0.8rem;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cal-nav-btn:active { background: #f1f5f9; }

.cal-nav-label {
  font-size: 0.88rem;
  font-weight: 700;
  min-width: 110px;
  text-align: center;
}

.cal-nav-today {
  padding: 4px 12px;
  border-radius: 8px;
  border: 1px solid var(--brand);
  background: #fff;
  color: var(--brand);
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}

html[data-brand="snsclub"] .cal-nav-today {
  border-color: #c9a227;
  color: #c9a227;
}

.cal-add-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.cal-other-row {
  margin-top: 8px;
}

/* --- Calendar day list --- */
.cal-day-list {
  padding: 0;
}

.cal-day {
  padding: 10px 14px;
  margin-bottom: 6px;
  background: #fff;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
}

.cal-day.today {
  border-color: var(--brand);
  background: #fffbeb;
}

html[data-brand="snsclub"] .cal-day.today {
  border-color: #c9a227;
  background: #fefbf0;
}

.cal-day.weekend { background: #fafafa; }

.cal-day-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}

.cal-day-date {
  font-size: 0.82rem;
  font-weight: 700;
}

.cal-day-num {
  font-size: 0.68rem;
  color: var(--muted);
  font-weight: 600;
}

.cal-event {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 0;
  font-size: 0.78rem;
}

.cal-event.done { opacity: 0.55; }

.cal-event-icon { font-size: 0.82rem; flex-shrink: 0; }

.cal-event-label {
  font-weight: 500;
  flex: 1;
  min-width: 0;
}

.cal-empty {
  font-size: 0.72rem;
  color: var(--muted);
  padding: 2px 0;
}

.schedule-mini-list {
  margin: 0 0 12px;
}

.schedule-mini-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid #f1f5f9;
  font-size: 0.82rem;
}

.home-split-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 12px;
}

.home-split-col .next-post-card,
.home-split-col .home-side-card {
  margin-bottom: 0;
}

.home-side-card {
  padding: 12px;
}

.due-side-row {
  padding: 8px 0;
  border-bottom: 1px solid #f1f5f9;
}

.due-side-row:last-child {
  border-bottom: none;
}

.due-side-title {
  font-size: 0.82rem;
  font-weight: 700;
  line-height: 1.4;
}

.due-side-date {
  font-size: 0.72rem;
  margin-top: 3px;
}

/* swipe tasks */
.swipe-item {
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid #f1f5f9;
}

.swipe-item:last-child {
  border-bottom: none;
}

.swipe-actions {
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 132px;
  display: flex;
  z-index: 1;
}

.swipe-btn {
  flex: 1;
  border: none;
  color: #fff;
  font-size: 0.74rem;
  font-weight: 700;
  font-family: inherit;
}

.swipe-btn.done {
  background: #0f766e;
}

.swipe-btn.postpone {
  background: #b45309;
}

.swipe-main {
  position: relative;
  z-index: 2;
  background: #fff;
  display: flex;
  gap: 10px;
  align-items: center;
  padding: 12px 0;
  transition: transform 0.2s ease;
}

.swipe-item.open .swipe-main {
  transform: translateX(-132px);
}

.swipe-left-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: #e2e8f0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.swipe-main-body {
  flex: 1;
  min-width: 0;
}

.swipe-title {
  font-size: 0.92rem;
  font-weight: 700;
}

.swipe-due {
  margin-top: 3px;
  font-size: 0.76rem;
}

.swipe-student {
  font-size: 0.7rem;
  color: var(--muted);
}

/* memo */
.memo-row {
  padding: 10px 0;
  border-bottom: 1px solid #f1f5f9;
}

.memo-row:last-child {
  border-bottom: none;
}

.memo-date {
  font-size: 0.68rem;
  color: var(--muted);
  margin-bottom: 2px;
}

.memo-text {
  font-size: 0.86rem;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
}

.memo-head {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 2px;
}

.memo-cat-tag {
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--brand);
  color: #fff;
  font-weight: 600;
}

html[data-brand="snsclub"] .memo-cat-tag {
  background: #1a2f52;
  color: #fff;
}

.memo-view-tabs {
  display: flex;
  gap: 0;
  margin: 0 0 4px;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.memo-view-tab {
  flex: 1;
  padding: 8px 0;
  text-align: center;
  border: none;
  background: var(--card);
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 600;
  cursor: pointer;
}
.memo-view-tab.active {
  background: var(--brand);
  color: #fff;
}

.memo-group-card {
  padding: 0 !important;
  overflow: hidden;
}
.memo-group-head {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 12px 16px;
  border: none;
  background: none;
  cursor: pointer;
  text-align: left;
  gap: 8px;
}
.memo-group-head:active {
  background: rgba(0,0,0,0.03);
}
.memo-group-title {
  font-size: 0.9rem;
  font-weight: 700;
  flex: 1;
}
.memo-group-count {
  font-size: 0.72rem;
  color: var(--muted);
  font-weight: 600;
}
.memo-group-arrow {
  font-size: 0.65rem;
  color: var(--muted);
}
.memo-group-body {
  padding: 0 16px 12px;
  max-height: 320px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.memo-entry {
  padding: 8px 0;
  border-top: 1px solid #f1f5f9;
}
.memo-more {
  margin: 8px 0 0;
  text-align: center;
  font-size: 0.72rem;
  color: var(--muted);
}

/* === 投稿ガントチャート === */
.gantt-card {
  padding: 16px;
  border: 1px solid #f0f0f0;
  box-shadow: none;
}

.gantt-header {
  margin-bottom: 10px;
}

.gantt-title-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

.gantt-post-num {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
}

.gantt-title {
  font-size: 1.05rem;
  font-weight: 700;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.gantt-title-edit-btn {
  flex-shrink: 0;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  background: #fff;
  font-size: 0.85rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-family: inherit;
}

.gantt-title-edit-btn:active {
  background: var(--bg);
}

.gantt-title-edit {
  display: flex;
  align-items: center;
  gap: 6px;
}

.gantt-title-input {
  flex: 1;
  min-width: 0;
  padding: 6px 10px;
  font-size: 0.95rem;
  font-weight: 700;
  border: 2px solid var(--brand);
  border-radius: 8px;
  font-family: inherit;
  outline: none;
}

.gantt-title-save-btn {
  flex-shrink: 0;
  padding: 6px 10px;
  border-radius: 8px;
  border: none;
  background: var(--brand);
  color: #fff;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
}

.gantt-title-cancel-btn {
  flex-shrink: 0;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid #d1d5db;
  background: #fff;
  font-size: 0.9rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  font-family: inherit;
}

.gantt-meta {
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 2px;
}

.gantt-progress-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}

.gantt-progress-bar {
  flex: 1;
  height: 8px;
  background: #e2e8f0;
  border-radius: 4px;
  overflow: hidden;
}

.gantt-progress-fill {
  height: 100%;
  background: var(--brand);
  border-radius: 4px;
  transition: width 0.4s ease;
}

.gantt-progress-fill.complete {
  background: var(--ok);
}

.gantt-pct {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--brand);
  min-width: 36px;
  text-align: right;
}

.gantt-phase-block {
  margin-top: 8px;
  border: 1px solid #f0f0f0;
  border-radius: 14px;
  padding: 10px 12px 6px;
  background: #fafcfe;
}

.gantt-phase-block.phase-complete {
  border-color: var(--ok);
  background: #f0fdf4;
}

.gantt-phase-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-bottom: 8px;
  border-bottom: 1px solid #e2e8f0;
  margin-bottom: 4px;
}

.gantt-phase-head-left {
  flex: 1;
  min-width: 0;
}

.gantt-phase-label {
  font-size: 0.74rem;
  font-weight: 700;
  color: var(--text);
  margin: 0;
  letter-spacing: 0.02em;
}

.gantt-phase-deadline {
  font-size: 0.68rem;
  color: var(--muted);
  margin-top: 2px;
}

.gantt-phase-complete-btn {
  flex-shrink: 0;
  padding: 6px 12px;
  border-radius: 8px;
  border: 1.5px solid var(--brand);
  background: #fff;
  color: var(--brand);
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}

.gantt-phase-complete-btn:active {
  background: var(--brand);
  color: #fff;
  transform: scale(0.95);
}

html[data-brand="snsclub"] .gantt-phase-complete-btn {
  border-color: #c9a227;
  color: #c9a227;
}

html[data-brand="snsclub"] .gantt-phase-complete-btn:active {
  background: #c9a227;
  color: #0f1f3a;
}

.gantt-phase-done-badge {
  flex-shrink: 0;
  padding: 4px 10px;
  border-radius: 8px;
  background: var(--ok);
  color: #fff;
  font-size: 0.72rem;
  font-weight: 700;
}

.gantt-step-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid #f8fafc;
}

.gantt-step-row:last-child {
  border-bottom: none;
}

.gantt-step-row.step-done {
  opacity: 0.6;
}

.gantt-step-row.step-current {
  background: #fffbeb;
  border-radius: 8px;
  padding: 8px 6px;
  margin: 0 -4px;
}

html[data-brand="snsclub"] .gantt-step-row.step-current {
  background: #f8f4e6;
}

.gantt-step-icon {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid #d1d5db;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.72rem;
  cursor: pointer;
  transition: all 0.15s;

        if (!Array.isArray(db.consultations)) db.consultations = [];

    if (!Array.isArray(db.activityLog)) db.activityLog = [];

  function ensureProfile(u) {
    if (!u) return;
    if (!u.profile || typeof u.profile !== 'object') {
      u.profile = {};
    }
    const p = u.profile;
    if (p.className === undefined) p.className = '';
    if (p.instagram === undefined) p.instagram = '';
    if (p.tiktok === undefined) p.tiktok = '';
    if (p.youtube === undefined) p.youtube = '';
    if (p.avatarDataUrl === undefined) p.avatarDataUrl = '';
    if (p.startDate === undefined) p.startDate = '';
    if (p.visionLife === undefined) p.visionLife = '';
    if (p.goalHalfYear === undefined) p.goalHalfYear = '';
    if (p.goalPostCount === undefined) {
      var legacyCount = parseInt(String(p.goalNumber || '').replace(/[^\d]/g, ''), 10);
      p.goalPostCount = isNaN(legacyCount) ? '' : String(legacyCount);
    }
    if (p.nextPostDate === undefined) p.nextPostDate = '';
    if (!p.postPace || typeof p.postPace !== 'object') {
      p.postPace = {};
    }
    POST_STEPS.forEach(function (s) {
      if (p.postPace[s.key] === undefined) p.postPace[s.key] = s.weight >= 15 ? 2 : (s.weight >= 10 ? 2 : 1);
    });
    if (!u.profile.milestonesDone) u.profile.milestonesDone = {};
    if (!u.profile.starterDone) u.profile.starterDone = {};
  }

  function migrateDbProfiles() {
    db.users.forEach((u) => ensureProfile(u));
  }

  /** 生徒のみ。LINE18は納期のみ／1投稿終了日から30日で10投稿目安 */
  function ensureMilestones(u) {
    if (!u || u.role !== 'student') return;
    if (!u.milestones || typeof u.milestones !== 'object') {
      u.milestones = { line18DueDate: '', firstLessonDoneDate: '' };
    }
    if (u.milestones.line18DueDate === undefined) u.milestones.line18DueDate = '';
    if (u.milestones.firstLessonDoneDate === undefined) u.milestones.firstLessonDoneDate = '';
    if (u.milestones.starterCompletedDate === undefined) u.milestones.starterCompletedDate = '';
  }

  function migrateDbMilestones() {
    db.users.forEach((u) => ensureMilestones(u));
  }

  /** YYYY-MM-DD に n 日加算 */
  function addDaysToIsoDate(isoDateStr, n) {
    if (!isoDateStr || typeof n !== 'number') return '';
    const d = new Date(isoDateStr + 'T12:00:00');
    if (isNaN(d.getTime())) return '';
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0, 10);
  }

  function tenLessonsDeadlineFrom(isoFirstLessonDone) {
    return addDaysToIsoDate(isoFirstLessonDone, 30);
  }

  function canEditMilestones(viewer, studentUserId) {
    if (!viewer) return false;
    if (viewer.role === 'student') return viewer.id === studentUserId;
    return canViewStudent(viewer, studentUserId);
  }

  function saveMilestones(studentUserId, line18Due, firstLessonDone) {
    const u = getUserById(studentUserId);
    if (!u || u.role !== 'student' || !canEditMilestones(sessionUser, studentUserId)) return false;
    ensureMilestones(u);
    u.milestones.line18DueDate = line18Due || '';
    u.milestones.firstLessonDoneDate = firstLessonDone || '';
    saveDb();
    renderAll();
    return true;
  }

    try {

      if (!id) return null;
      return db.users.find((u) => u.id === id) || null;
    } catch (e) {
      return null;
    }

  function setSession(user) {
    sessionUser = user;
    if (user) localStorage.setItem(SESSION_KEY, user.id);
    else localStorage.removeItem(SESSION_KEY);
  }

    return db.users.filter((u) => u.role === 'student');

  function getUserById(id) {
    return db.users.find((u) => u.id === id);
  }

  function canViewStudent(viewer, studentUserId) {
    if (!viewer) return false;
    const st = getUserById(studentUserId);
    if (!st || st.role !== 'student') return false;
    if (viewer.role === 'admin') return true;
    if (viewer.role === 'student') return viewer.id === studentUserId;
    const links = st.links || {};
    if (viewer.role === 'manager' && links.managerId === viewer.id) return true;
    if (viewer.role === 'coach' && links.coachId === viewer.id) return true;
    if (viewer.role === 'leader' && links.leaderId === viewer.id) return true;
    return false;
  }

  function visibleStudentIds(viewer) {
    if (!viewer) return [];
    if (viewer.role === 'admin') return getStudentUsers().map((s) => s.id);
    if (viewer.role === 'student') return [viewer.id];
    return getStudentUsers()
      .filter((s) => canViewStudent(viewer, s.id))
      .map((s) => s.id);
  }

  function tasksForViewer() {
    if (!sessionUser) return [];
    const ids = new Set(visibleStudentIds(sessionUser));
    return db.tasks.filter((t) => ids.has(t.studentUserId));
  }

  function canEditTask(viewer, task) {
    if (!viewer || !task) return false;
    if (viewer.role === 'student') return viewer.id === task.studentUserId;
    return canViewStudent(viewer, task.studentUserId);
  }

  function canCreateTaskFor(viewer, studentUserId) {

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr + 'T12:00:00');
    const now = new Date();
    now.setHours(12, 0, 0, 0);
    return Math.ceil((d - now) / (1000 * 60 * 60 * 24));
  }

  function dueClass(dateStr) {
    const d = daysUntil(dateStr);
    if (d === null) return '';
    if (d < 0) return 'due-over';
    if (d <= 3) return 'due-soon';
    return '';
  }

  function dueText(dateStr) {
    const d = daysUntil(dateStr);
    if (d === null) return '';
    if (d < 0) return '期限超過 ' + Math.abs(d) + '日前';
    if (d === 0) return '今日が期限';
    return 'あと' + d + '日';
  }

  function progressPercent(task) {
    if (!task.targetNumber) return 0;
    return Math.min(100, Math.round((task.currentNumber / task.targetNumber) * 100));
  }

  function isTaskDone(task) {
    return task.completed || (task.targetNumber > 0 && task.currentNumber >= task.targetNumber);
  }

  let openCheckpointIdx = null;

  /**
   * チェックポイント定義。投稿数ベースで自動判定。
   * cp.postMin〜cp.postMax の範囲の投稿タスクを紐づけ。
   */
  var CHECKPOINTS = [
    { key: 'starter',  label: 'ステップ1', name: 'スタータープログラム完了', icon: '🚀', postMin: 0, postMax: 0 },
    { key: 'post1',    label: 'ステップ2', name: '1投稿目 完了',         icon: '🎉', postMin: 1, postMax: 1 },
    { key: 'post2_5',  label: 'ステップ3', name: '2〜5投稿目',          icon: '📝', postMin: 2, postMax: 5 },
    { key: 'post6_10', label: 'ステップ4', name: '6〜10投稿目',         icon: '🏆', postMin: 6, postMax: 10 },
  ];

  function getCheckpointStatuses(studentUser) {
    ensureMilestones(studentUser);
    ensureProfile(studentUser);
    var m = studentUser.milestones;
    var totalPosts = totalPostCount(studentUser.id);

    var starterDone = !!m.line18DueDate && daysUntil(m.line18DueDate) !== null && daysUntil(m.line18DueDate) < 0;
    if (m.starterCompletedDate) starterDone = true;

    var post1Done = totalPosts >= 1;
    var post5Done = totalPosts >= 5;
    var post10Done = totalPosts >= 10;

    var results = [];
    CHECKPOINTS.forEach(function (cp, idx) {
      var status = 'locked';
      var doneDate = '';
      var targetDate = '';

      if (cp.key === 'starter') {
        targetDate = m.line18DueDate || '';
        doneDate = m.starterCompletedDate || '';
        if (doneDate) { status = 'done'; }
        else { status = 'current'; }
      } else if (cp.key === 'post1') {
        doneDate = m.firstLessonDoneDate || '';
        if (post1Done || doneDate) { status = 'done'; }
        else if (starterDone || m.starterCompletedDate) { status = 'current'; }
      } else if (cp.key === 'post2_5') {
        if (post5Done) { status = 'done'; }
        else if (post1Done || m.firstLessonDoneDate) { status = 'current'; }
      } else if (cp.key === 'post6_10') {
        if (post10Done) { status = 'done'; }
        else if (post5Done) { status = 'current'; }
      }

      results.push({
        idx: idx,
        key: cp.key,
        label: cp.label,
        name: cp.name,
        icon: cp.icon,
        status: status,
        doneDate: doneDate,
        targetDate: targetDate,
        postMin: cp.postMin,
        postMax: cp.postMax,
        totalPosts: totalPosts,
      });
    });
    var currentIndexes = results
      .map(function (r, i) { return r.status === 'current' ? i : -1; })
      .filter(function (i) { return i >= 0; });
    if (currentIndexes.length > 1) {
      var keep = currentIndexes[0];
      currentIndexes.forEach(function (i) {
        if (i !== keep) results[i].status = 'locked';
      });
    }
    return results;
  }

  function roadmapHtml(studentUser) {
    var cps = getCheckpointStatuses(studentUser);
    var totalPosts = totalPostCount(studentUser.id);
    var overallPct = Math.min(100, Math.round((totalPosts / 10) * 100));

    var html = '<div class="roadmap">';
    html += '<p class="roadmap-title">学習ロードマップ</p>';
    html += '<p class="roadmap-sub">10投稿 達成までの道のり</p>';

    html += '<div style="margin:0 16px 20px;"><div class="rmap-progress-mini"><div class="fill' + (overallPct >= 100 ? ' done' : '') + '" style="width:' + overallPct + '%"></div></div>';
    html += '<div style="display:flex;justify-content:space-between;font-size:0.7rem;color:var(--muted);margin-top:4px;"><span>' + totalPosts + ' / 10 投稿</span><span>' + overallPct + '%</span></div></div>';

    html += '<div class="roadmap-path">';
    cps.forEach(function (cp, i) {
      var align = 'align-left';
      var segmentClass = 'rmap-segment ' + align + (cp.status === 'current' ? '' : ' inactive');
      var circleClass = 'rmap-circle status-' + cp.status;
      var circleIcon = cp.status === 'done' ? '✓' : cp.status === 'current' ? '●' : '🔒';

      html += '<div class="' + segmentClass + '">';

      html += '<div class="rmap-node-col">';
      html += '<div class="' + circleClass + '" data-cp-idx="' + i + '">' + circleIcon;
      if (cp.status === 'current') html += '<span class="rmap-current-tag">今ここ</span>';
      html += '</div>';
      if (i < cps.length - 1) {
        html += '<div class="rmap-road' + (cp.status !== 'locked' ? ' active' : '') + '"></div>';
      }
      html += '</div>';
      html += '<div class="rmap-info">';
      html += '<p class="rmap-label">' + escapeHtml(cp.label) + '</p>';
      html += '<p class="rmap-name">' + escapeHtml(cp.name) + '</p>';

      if (cp.status === 'done' && cp.doneDate) {
        html += '<p class="rmap-date celebrate">✓ ' + shortDate(cp.doneDate) + ' に完了</p>';
      } else if (cp.status === 'done' && cp.key === 'post1') {
        html += '<p class="rmap-date celebrate">🎉 1投稿目おめでとう！</p>';
      } else if (cp.status === 'done') {
        html += '<p class="rmap-date celebrate">✓ 達成済み</p>';
      } else if (cp.status === 'current' && cp.targetDate) {
        html += '<p class="rmap-date">目標: ' + shortDate(cp.targetDate) + '</p>';
      } else if (cp.status === 'current') {
        html += '<p class="rmap-date" style="font-weight:600;">このステップを進行中</p>';
      }

      if (cp.status === 'current' && cp.key !== 'starter') {
        var pctInPhase = 0;
        if (cp.key === 'post1') pctInPhase = totalPosts >= 1 ? 100 : 0;
        else if (cp.key === 'post2_5') pctInPhase = Math.min(100, Math.round(Math.max(0, totalPosts - 1) / 4 * 100));
        else if (cp.key === 'post6_10') pctInPhase = Math.min(100, Math.round(Math.max(0, totalPosts - 5) / 5 * 100));
        html += '<div class="rmap-progress-mini"><div class="fill" style="width:' + pctInPhase + '%"></div></div>';
      }

      if (openCheckpointIdx === i) {
        html += roadmapDetailHtml(cp, studentUser);
      }

      html += '</div>';
      html += '</div>';
    });
    html += '</div></div>';
    return html;
  }

    html += '</div>';

    return [...list].sort((a, b) => {
      const da = a.dueDate || '9999';
      const db_ = b.dueDate || '9999';
      if (da !== db_) return da.localeCompare(db_);
      return (a.title || '').localeCompare(b.title || '', 'ja');
    });
  }

  function todayIso() {

  var DAY_NAMES = ['日', '月', '火', '水', '木', '金', '土'];

  function shortDate(dateStr) {
    if (!dateStr) return '';
    var d = new Date(dateStr + 'T12:00:00');
    if (isNaN(d.getTime())) return dateStr;
    return (d.getMonth() + 1) + '/' + d.getDate() + '(' + DAY_NAMES[d.getDay()] + ')';
  }

  function bindSwipeTaskRows(container) {
    container.querySelectorAll('[data-swipe-item]').forEach(function (item) {
      var main = item.querySelector('.swipe-main');
      var startX = 0;
      var currentX = 0;
      var dragging = false;
      item.addEventListener('touchstart', function (e) {
        if (!e.touches || !e.touches[0]) return;
        startX = e.touches[0].clientX;
        dragging = true;
      }, { passive: true });
      item.addEventListener('touchmove', function (e) {
        if (!dragging || !e.touches || !e.touches[0]) return;
        currentX = e.touches[0].clientX - startX;
        if (currentX < 0) {
          var move = Math.max(-132, currentX);
          if (main) main.style.transform = 'translateX(' + move + 'px)';
        }
      }, { passive: true });
      item.addEventListener('touchend', function () {
        dragging = false;
        if (currentX < -52) item.classList.add('open');
        else item.classList.remove('open');
        if (main) main.style.transform = '';
        currentX = 0;
      });
    });
    container.querySelectorAll('[data-swipe-done]').forEach(function (btn) {
      btn.addEventListener('click', function () { completeTask(btn.getAttribute('data-swipe-done')); });
    });
    container.querySelectorAll('[data-swipe-postpone]').forEach(function (btn) {
      btn.addEventListener('click', function () { postponeTaskByDays(btn.getAttribute('data-swipe-postpone'), 7); });
    });
  }

      btn.addEventListener('click', function () {

      });
    });
  }

  function isOverdue(task) {
    if (!task.dueDate || isTaskDone(task)) return false;
    return daysUntil(task.dueDate) < 0;
  }

  function rescheduleTask(taskId, newDate) {
    var t = db.tasks.find(function (x) { return x.id === taskId; });
    if (!t || !canEditTask(sessionUser, t)) return;
    if (!t.originalDueDate) t.originalDueDate = t.dueDate;
    if (!t.rescheduleCount) t.rescheduleCount = 0;
    t.rescheduleCount++;
    if (!t.rescheduleHistory) t.rescheduleHistory = [];
    t.rescheduleHistory.push({ from: t.dueDate, to: newDate, at: new Date().toISOString() });
    t.dueDate = newDate;
    saveDb();
    renderAll();
  }

  function incrementTask(taskId, delta) {
    const t = db.tasks.find((x) => x.id === taskId);
    if (!t || !canEditTask(sessionUser, t)) return;
    t.currentNumber = Math.max(0, (t.currentNumber || 0) + delta);
    if (t.targetNumber > 0 && t.currentNumber >= t.targetNumber) t.completed = true;
    saveDb();
    renderAll();
  }

    saveDb();
    scheduleViewDate = date;
    renderSchedule();
  }

  var scheduleViewMode = 'week';
  var scheduleViewDate = null;
  var scheduleSubTab = 'calendar';

  function getAllEventsForDate(day, byDate, sessionsByDate) {
    var events = [];
    (byDate[day] || []).forEach(function (b) {
      events.push({ type: 'booking', label: b.category, icon: '📌' });
    });
    (sessionsByDate[day] || []).forEach(function (t) {
      events.push({ type: 'session-task', label: t.title, icon: t.done ? '✅' : '⬜', done: t.done });
    });
    return events;
  }

  function buildSessionTasksByDate() {
    var map = {};
    var sessions = getCoachingSessions(sessionUser.id);
    sessions.forEach(function (sess) {
      sess.tasks.forEach(function (t) {
        if (t.dueDate) {
          if (!map[t.dueDate]) map[t.dueDate] = [];
          map[t.dueDate].push(t);
        }
      });
    });
    return map;
  }

  function renderSchedule() {
    var el = document.getElementById('scheduleContent');
    if (!el) return;
    if (!sessionUser || sessionUser.role !== 'student') {
      el.innerHTML = '<div class="card"><p class="card-title">スケジュール</p><p style="margin:0;color:var(--muted);">生徒アカウントで予定を確認できます。</p></div>';
      return;
    }
    ensureProfile(sessionUser);
    if (!scheduleViewDate) scheduleViewDate = todayIso();

    var html = '';

    html += '<div class="rm-tabs">';
    html += '<button type="button" class="rm-tab' + (scheduleSubTab === 'calendar' ? ' active' : '') + '" data-sched-sub="calendar">スケジュール</button>';
    html += '<button type="button" class="rm-tab' + (scheduleSubTab === 'memo' ? ' active' : '') + '" data-sched-sub="memo">メモ</button>';
    html += '</div>';

    if (scheduleSubTab === 'memo') {
      html += renderMemoInlineHtml();
    } else {
      html += renderCalendarHtml();
    }

    el.innerHTML = html;
    bindScheduleEvents(el);
  }

  function renderCalendarHtml() {
    var start = programStartDateOf(sessionUser);
    var bookings = bookingsForStudent(sessionUser.id);
    var byDate = {};
    bookings.forEach(function (b) {
      if (!byDate[b.date]) byDate[b.date] = [];
      byDate[b.date].push(b);
    });
    var sessionsByDate = buildSessionTasksByDate();

    var html = '';

    html += '<div class="cal-view-tabs">';
    ['day', 'week', 'month'].forEach(function (v) {
      var label = { day: '1日', week: '7日', month: '30日' }[v];
      html += '<button type="button" class="cal-view-tab' + (scheduleViewMode === v ? ' active' : '') + '" data-cal-view="' + v + '">' + label + '</button>';
    });
    html += '</div>';

    html += '<div class="cal-nav">';
    html += '<button type="button" class="cal-nav-btn" data-cal-prev>◀</button>';
    html += '<span class="cal-nav-label">' + shortDate(scheduleViewDate) + '</span>';
    html += '<button type="button" class="cal-nav-btn" data-cal-next>▶</button>';
    html += '<button type="button" class="cal-nav-today" data-cal-today>今日</button>';
    html += '</div>';

    html += '<div class="card"><p class="card-title">予定の登録</p>';
    html += '<div class="cal-add-row">';
    html += '<select id="scheduleCategory" class="input" style="flex:1;">';
    html += '<option value="">種類を選択</option>';
    ACTIVITY_CATEGORIES.forEach(function (c) {
      html += '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '</option>';
    });
    html += '</select>';
    html += '<input type="date" id="scheduleDate" class="input" value="' + todayIso() + '" style="width:140px;" />';
    html += '</div>';
    html += '<div id="scheduleOtherRow" class="cal-other-row" style="display:none;">';
    html += '<input type="text" id="scheduleOtherText" class="input" placeholder="予定の内容を入力" maxlength="60" />';
    html += '</div>';
    html += '<button type="button" class="btn btn-primary btn-small" id="scheduleAddBtn" style="margin-top:8px;width:100%;">登録</button>';
    html += '</div>';

    var dayCount = { day: 1, week: 7, month: 30 }[scheduleViewMode] || 7;
    var viewStart = scheduleViewDate;

    html += '<div class="cal-day-list">';
    for (var i = 0; i < dayCount; i++) {
      var day = addDaysToIsoDate(viewStart, i);
      if (!day) continue;
      var events = getAllEventsForDate(day, byDate, sessionsByDate);
      var dayClass = day === todayIso() ? ' today' : '';
      var isWeekend = new Date(day + 'T12:00:00').getDay() % 6 === 0;
      if (isWeekend) dayClass += ' weekend';
      var dayNum = '';
      for (var d = 0; d < 210; d++) {
        if (addDaysToIsoDate(start, d) === day) { dayNum = 'Day ' + (d + 1); break; }
      }

      html += '<div class="cal-day' + dayClass + '">';
      html += '<div class="cal-day-header">';
      html += '<span class="cal-day-date">' + shortDate(day) + '</span>';
      if (dayNum) html += '<span class="cal-day-num">' + dayNum + '</span>';
      html += '</div>';
      if (events.length > 0) {
        events.forEach(function (ev) {
          var evCls = 'cal-event' + (ev.done ? ' done' : '');
          html += '<div class="' + evCls + '">';
          html += '<span class="cal-event-icon">' + ev.icon + '</span>';
          html += '<span class="cal-event-label">' + escapeHtml(ev.label) + '</span>';
          html += '</div>';
        });
      } else {
        html += '<div class="cal-empty">予定なし</div>';
      }
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  function bindScheduleEvents(el) {
    el.querySelectorAll('[data-sched-sub]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        scheduleSubTab = btn.getAttribute('data-sched-sub');
        renderSchedule();
      });
    });

    if (scheduleSubTab === 'memo') {
      bindMemoEvents(el);
      return;
    }

    var catSelect = document.getElementById('scheduleCategory');
    var otherRow = document.getElementById('scheduleOtherRow');
    if (catSelect && otherRow) {
      catSelect.addEventListener('change', function () {
        otherRow.style.display = catSelect.value === 'その他' ? '' : 'none';
      });
    }

    var addBtn = document.getElementById('scheduleAddBtn');
    if (addBtn) addBtn.addEventListener('click', addScheduleBooking);

    el.querySelectorAll('[data-cal-view]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        scheduleViewMode = btn.getAttribute('data-cal-view');
        renderSchedule();
      });
    });

    var prevBtn = el.querySelector('[data-cal-prev]');
    var nextBtn = el.querySelector('[data-cal-next]');
    var todayBtn = el.querySelector('[data-cal-today]');
    var step = { day: 1, week: 7, month: 30 }[scheduleViewMode] || 7;
    if (prevBtn) prevBtn.addEventListener('click', function () {
      scheduleViewDate = addDaysToIsoDate(scheduleViewDate, -step);
      renderSchedule();
    });
    if (nextBtn) nextBtn.addEventListener('click', function () {
      scheduleViewDate = addDaysToIsoDate(scheduleViewDate, step);
      renderSchedule();
    });
    if (todayBtn) todayBtn.addEventListener('click', function () {
      scheduleViewDate = todayIso();
      renderSchedule();
    });
  }

  // === 投稿ワークフロー + ガントチャート ===

  function postsForStudent(studentId) {
    return (db.posts || [])
      .filter(function (p) { return p.studentUserId === studentId; })
      .sort(function (a, b) { return (a.targetDate || '9999').localeCompare(b.targetDate || '9999'); });
  }

  function createNewPost(studentId, startDate) {
    var existing = postsForStudent(studentId);
    var num = existing.length + 1;
    var steps = {};
    POST_STEPS.forEach(function (s) {
      steps[s.key] = { done: false, doneDate: '' };
    });
    var s = startDate || todayIso();
    var post = {
      id: uid('post'),
      studentUserId: studentId,
      title: '投稿 #' + num,
      startDate: s,
      targetDate: addDaysToIsoDate(s, totalPaceDays()),
      steps: steps,
      createdAt: new Date().toISOString(),
    };
    db.posts.push(post);
    saveDb();
    return post;
  }

  function togglePostStep(postId, stepKey) {
    var post = db.posts.find(function (p) { return p.id === postId; });
    if (!post || post.studentUserId !== sessionUser.id) return;
    var step = post.steps[stepKey];
    if (!step) return;
    step.done = !step.done;
    step.doneDate = step.done ? todayIso() : '';

    if (step.done && phaseProgress(post, 3).complete) {
      POST_STEPS.forEach(function (s) {
        if (s.phase < 3 && post.steps[s.key] && !post.steps[s.key].done) {
          post.steps[s.key].done = true;
          if (!post.steps[s.key].doneDate) post.steps[s.key].doneDate = todayIso();
        }
      });
    }

    saveDb();
    renderPosts();
    renderHome();
  }

  function postProgress(post) {
    var done = 0;
    var total = POST_STEPS.length;
    POST_STEPS.forEach(function (s) {
      if (post.steps[s.key] && post.steps[s.key].done) done++;
    });
    return { done: done, total: total, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
  }

  function phaseProgress(post, phase) {
    var steps = POST_STEPS.filter(function (s) { return s.phase === phase; });
    var done = 0;
    steps.forEach(function (s) {
      if (post.steps[s.key] && post.steps[s.key].done) done++;
    });
    return { done: done, total: steps.length, complete: done === steps.length && steps.length > 0 };
  }

  function phaseDeadline(stepDates, phase) {
    var last = '';
    var first = '';
    stepDates.forEach(function (s) {
      if (s.phase === phase) {
        if (!first) first = s.startDate;
        last = s.endDate;
      }
    });
    return { start: first, end: last };
  }

  function completePhase(postId, phase) {
    var post = db.posts.find(function (p) { return p.id === postId; });
    if (!post || post.studentUserId !== sessionUser.id) return;
    POST_STEPS.forEach(function (s) {
      if (s.phase === phase && post.steps[s.key]) {
        post.steps[s.key].done = true;
        if (!post.steps[s.key].doneDate) post.steps[s.key].doneDate = todayIso();
      }
    });
    saveDb();
    renderPosts();
    renderHome();
  }

  function currentPostStep(post) {
    for (var i = 0; i < POST_STEPS.length; i++) {
      var s = POST_STEPS[i];
      if (!post.steps[s.key] || !post.steps[s.key].done) return s;
    }
    return null;
  }

  function getPostPace() {
    if (!sessionUser) return {};
    ensureProfile(sessionUser);
    return sessionUser.profile.postPace || {};
  }

  function totalPaceDays() {
    var pace = getPostPace();
    var total = 0;
    POST_STEPS.forEach(function (s) { total += (pace[s.key] || 1); });
    return total;
  }

  function computeStepDates(post) {
    var pace = getPostPace();
    var results = [];
    var dayOffset = 0;
    var totalDays = 0;
    POST_STEPS.forEach(function (s) { totalDays += (pace[s.key] || 1); });
    if (totalDays < 1) totalDays = 1;

    POST_STEPS.forEach(function (s) {
      var days = pace[s.key] || 1;
      var stepStart = addDaysToIsoDate(post.startDate, dayOffset);
      dayOffset += days;
      var stepEnd = addDaysToIsoDate(post.startDate, dayOffset);
      results.push({
        key: s.key,
        label: s.label,
        phase: s.phase,
        startDate: stepStart,
        endDate: stepEnd,
        days: days,
        dayOffset: dayOffset - days,
        totalDays: totalDays,
        done: post.steps[s.key] ? post.steps[s.key].done : false,
      });
    });
    return results;
  }

  function stepRemainingText(endDate, done) {
    if (done) return '';
    var d = daysUntil(endDate);
    if (d === null) return '';
    if (d < 0) return '期限超過';
    if (d === 0) return '今日';
    return 'あと' + d + '日';
  }

  function phaseBarHtml(post, phase) {
    var pp = phaseProgress(post, phase);
    var pct = pp.total > 0 ? Math.round((pp.done / pp.total) * 100) : 0;
    var fillClass = 'gantt-phase-bar-fill phase' + phase + '-fill' + (pp.complete ? ' bar-complete' : '');
    return '<div class="gantt-phase-bar-row">' +
      '<div class="gantt-phase-bar-track"><div class="' + fillClass + '" style="width:' + pct + '%"></div></div>' +
      '<span class="gantt-phase-bar-pct">' + pct + '%</span></div>';
  }

  function postGanttCardHtml(post) {
    var prog = postProgress(post);
    var stepDates = computeStepDates(post);
    var cur = currentPostStep(post);
    var postNum = postsForStudent(post.studentUserId).indexOf(post) + 1;
    var safeId = post.id.replace(/[^a-zA-Z0-9_-]/g, '');

    var html = '<div class="card gantt-card">';
    html += '<div class="gantt-header">';
    if (editingPostId === post.id) {
      html += '<div class="gantt-title-edit">';
      html += '<span class="gantt-post-num">#' + postNum + '</span>';
      html += '<input type="text" id="editPostTitleInput_' + safeId + '" class="gantt-title-input" value="' + escapeHtml(post.title) + '" maxlength="40" />';
      html += '<button type="button" class="gantt-title-save-btn" data-save-post-title="' + post.id + '">保存</button>';
      html += '<button type="button" class="gantt-title-cancel-btn" data-cancel-edit-title="' + post.id + '">×</button>';
      html += '</div>';
    } else {
      html += '<div class="gantt-title-row">';
      html += '<span class="gantt-post-num">#' + postNum + '</span>';
      html += '<span class="gantt-title">' + escapeHtml(post.title) + '</span>';
      html += '<button type="button" class="gantt-title-edit-btn" data-edit-post-title="' + post.id + '">✎</button>';
      html += '</div>';
    }
    html += '<div class="gantt-meta">' + shortDate(post.startDate) + ' → ' + shortDate(post.targetDate) + '</div>';
    html += '</div>';
    html += '<div class="gantt-progress-row"><div class="gantt-progress-bar"><div class="gantt-progress-fill' + (prog.pct >= 100 ? ' complete' : '') + '" style="width:' + prog.pct + '%"></div></div><span class="gantt-pct">' + prog.pct + '%</span></div>';

    var openPhase = 0;
    stepDates.forEach(function (s) {
      if (s.phase !== openPhase) {
        if (openPhase !== 0) html += '</div>';
        openPhase = s.phase;
        var pp = phaseProgress(post, s.phase);
        var pd = phaseDeadline(stepDates, s.phase);
        var phaseClass = 'gantt-phase-block' + (pp.complete ? ' phase-complete' : '');

        html += '<div class="' + phaseClass + '">';
        html += '<div class="gantt-phase-head">';
        html += '<div class="gantt-phase-head-left">';
        html += '<div class="gantt-phase-label">' + PHASE_LABELS[s.phase] + '</div>';
        html += '<div class="gantt-phase-deadline">' + dueText(pd.end) + '</div>';
        html += '</div>';
        if (pp.complete) {
          html += '<span class="gantt-phase-done-badge">完了</span>';
        } else {
          html += '<button type="button" class="gantt-phase-complete-btn" data-complete-phase="' + post.id + '|' + s.phase + '">完了にする</button>';
        }
        html += '</div>';
        html += phaseBarHtml(post, s.phase);
      }

      var isCurrent = cur && cur.key === s.key;
      var rowClass = 'gantt-step-row' + (s.done ? ' step-done' : '') + (isCurrent ? ' step-current' : '');
      var icon = s.done ? '✓' : (isCurrent ? '●' : '○');
      var iconClass = 'gantt-step-icon' + (s.done ? ' done' : '') + (isCurrent ? ' current' : '');
      var remaining = stepRemainingText(s.endDate, s.done);

      html += '<div class="' + rowClass + '">';
      html += '<button type="button" class="' + iconClass + '" data-toggle-step="' + post.id + '|' + s.key + '">' + icon + '</button>';
      html += '<div class="gantt-step-info">';
      html += '<span class="gantt-step-name">' + escapeHtml(s.label) + '</span>';
      if (remaining) {
        var overdue = daysUntil(s.endDate) !== null && daysUntil(s.endDate) < 0;
        html += '<span class="step-days' + (overdue ? ' overdue' : '') + '">' + remaining + '</span>';
      }
      html += '</div>';
      html += '</div>';
    });
    if (openPhase !== 0) html += '</div>';

    html += '</div>';
    return html;
  }

  var editingPostId = null;
  var selectedPostId = null;

  function recordCompletedPosts() {
    if (!sessionUser || sessionUser.role !== 'student') return;
    var posts = postsForStudent(sessionUser.id);
    var recorded = 0;
    posts.forEach(function (p, idx) {
      if (postProgress(p).pct >= 100 && !p.recordedToCalendar) {
        var latestDone = '';
        POST_STEPS.forEach(function (s) {
          if (p.steps[s.key] && p.steps[s.key].doneDate) {
            if (!latestDone || p.steps[s.key].doneDate > latestDone) latestDone = p.steps[s.key].doneDate;
          }
        });
        var completionDate = latestDone || todayIso();
        var postNum = idx + 1;
        db.bookings.push({
          id: uid('booking'),
          studentUserId: sessionUser.id,
          category: '投稿 #' + postNum + ' 完了',
          date: completionDate,
          createdAt: new Date().toISOString(),
        });
        p.recordedToCalendar = true;
        recorded++;
      }
    });
    if (recorded > 0) {
      saveDb();
      renderPosts();
      renderSchedule();
      renderHome();
    }
  }

  function renderPosts() {
    var el = document.getElementById('postsContent');
    if (!el) return;
    if (!sessionUser || sessionUser.role !== 'student') {
      el.innerHTML = '<div class="card"><p class="card-title">投稿管理</p><p style="margin:0;color:var(--muted);">生徒アカウントで利用できます。</p></div>';
      return;
    }
    ensureProfile(sessionUser);
    var allPosts = postsForStudent(sessionUser.id);
    var activePosts = allPosts.filter(function (p) { return !p.recordedToCalendar; });
    var html = '';

    var unrecorded = allPosts.filter(function (p) {
      return postProgress(p).pct >= 100 && !p.recordedToCalendar;
    });
    if (unrecorded.length > 0) {
      html += '<div class="record-btn-row">';
      html += '<button type="button" class="btn btn-accent" id="btnRecordPosts">📅 まとめて記録（' + unrecorded.length + '件の完了投稿）</button>';
      html += '</div>';
    }

    html += '<div class="card post-add-card">';
    html += '<div class="post-add-row">';
    html += '<input type="date" id="newPostStartDate" class="input" value="' + todayIso() + '" style="flex:1;" />';
    html += '<button type="button" class="btn btn-primary btn-small" id="btnCreatePost">＋ 新しい投稿</button>';
    html += '</div>';
    html += '<p style="margin:6px 0 0;font-size:0.72rem;color:var(--muted);">' + totalPaceDays() + '日間のスケジュール（マイページで変更）</p>';
    html += '</div>';

    if (activePosts.length === 0) {
      var recorded = allPosts.length - activePosts.length;
      var msg = recorded > 0
        ? '進行中の投稿はありません。<br>' + recorded + '件は記録済みです。'
        : 'まだ投稿がありません。<br>上のボタンから最初の投稿を作成しましょう。';
      html += '<div class="card"><div class="empty-state">' + msg + '</div></div>';
    } else {
      if (!selectedPostId || !activePosts.find(function (p) { return p.id === selectedPostId; })) {
        var firstIncomplete = activePosts.find(function (p) { return postProgress(p).pct < 100; });
        selectedPostId = firstIncomplete ? firstIncomplete.id : activePosts[0].id;
      }
      if (activePosts.length > 1) {
        html += '<div class="post-selector">';
        activePosts.forEach(function (p) {
          var num = allPosts.indexOf(p) + 1;
          var prog = postProgress(p);
          var active = p.id === selectedPostId;
          var done = prog.pct >= 100;
          var cls = 'post-pill' + (active ? ' active' : '') + (done ? ' completed' : '');
          html += '<button type="button" class="' + cls + '" data-select-post="' + p.id + '">#' + num + (done ? ' ✓' : '') + '</button>';
        });
        html += '</div>';
      }

      var selected = activePosts.find(function (p) { return p.id === selectedPostId; });
      if (selected) html += postGanttCardHtml(selected);
    }

    el.innerHTML = html;

    var createBtn = document.getElementById('btnCreatePost');
    if (createBtn) {
      createBtn.addEventListener('click', function () {
        var dateEl = document.getElementById('newPostStartDate');
        var start = dateEl ? dateEl.value : '';
        if (!start) { alert('作業開始日を選択してください。'); return; }
        var newPost = createNewPost(sessionUser.id, start);
        selectedPostId = newPost.id;
        renderPosts();
        renderHome();
      });
    }

    var recordBtn = document.getElementById('btnRecordPosts');
    if (recordBtn) {
      recordBtn.addEventListener('click', recordCompletedPosts);
    }

    el.querySelectorAll('[data-select-post]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        selectedPostId = btn.getAttribute('data-select-post');
        renderPosts();
      });
    });

    bindPostCardEvents(el);
  }

  function bindPostCardEvents(container) {
    container.querySelectorAll('[data-toggle-step]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var parts = btn.getAttribute('data-toggle-step').split('|');
        togglePostStep(parts[0], parts[1]);
      });
    });

    container.querySelectorAll('[data-complete-phase]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var parts = btn.getAttribute('data-complete-phase').split('|');
        completePhase(parts[0], parseInt(parts[1], 10));
      });
    });

    container.querySelectorAll('[data-edit-post-title]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        editingPostId = btn.getAttribute('data-edit-post-title');
        renderPosts();
      });
    });

    container.querySelectorAll('[data-save-post-title]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var postId = btn.getAttribute('data-save-post-title');
        var input = container.querySelector('#editPostTitleInput_' + postId.replace(/[^a-zA-Z0-9_-]/g, ''));
        if (!input) return;
        var post = db.posts.find(function (p) { return p.id === postId; });
        if (!post) return;
        var newTitle = input.value.trim();
        if (newTitle) post.title = newTitle;
        editingPostId = null;
        saveDb();
        renderPosts();
        renderHome();
      });
    });

    container.querySelectorAll('[data-cancel-edit-title]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        editingPostId = null;
        renderPosts();
      });
    });
  }

  var paceEditOpen = false;

  function phaseDays(phaseNum) {
    ensureProfile(sessionUser);
    var pace = sessionUser.profile.postPace;
    var total = 0;
    POST_STEPS.forEach(function (s) { if (s.phase === phaseNum) total += (pace[s.key] || 1); });
    return total;
  }

  function paceSettingsHtml() {
    ensureProfile(sessionUser);
    var pace = sessionUser.profile.postPace;
    var total = totalPaceDays();
    var html = '<div class="card">';
    html += '<div class="pace-header-row">';
    html += '<p class="card-title" style="margin:0;">投稿ペース</p>';
    html += '<button type="button" class="pace-edit-toggle" id="paceToggleBtn">' + (paceEditOpen ? '✕ 閉じる' : '✏️ 編集') + '</button>';
    html += '</div>';

    html += '<div class="pace-summary">';

  function bindPaceButtons(container) {

    if (toggleBtn) {
      toggleBtn.addEventListener('click', function () {
        paceEditOpen = !paceEditOpen;
        renderMypage();
      });
    }

    container.querySelectorAll('[data-pace-minus]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var key = btn.getAttribute('data-pace-minus');

        if (cur > 1) {
          pace[key] = cur - 1;
          saveDb();
          renderMypage();
        }
      });
    });
    container.querySelectorAll('[data-pace-plus]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var key = btn.getAttribute('data-pace-plus');
        var cur = pace[key] || 1;
        if (cur < 14) {
          pace[key] = cur + 1;
          saveDb();
          renderMypage();
        }
      });
    });
